<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>As Minhas Receitas</title>
<style>
:root{
  --bg:#f5efd8;--card:#fefcf0;--border:#dfd4b8;--text:#2c3c2a;--muted:#7a8870;
  --accent:#c05818;--accent-light:#fde8d0;--teal:#2a5868;--green:#4a7840;
  --red:#b01820;--amber:#e88a18;--radius:12px;--shadow:0 2px 16px rgba(42,60,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;}

/* ── Header ─────────────────────────────────────────────────────── */
header{background:var(--card);border-bottom:2.5px solid var(--teal);position:sticky;top:0;z-index:100;}
.header-garland{height:18px;background:var(--card);display:flex;align-items:flex-end;justify-content:center;gap:0;overflow:hidden;border-top:1.5px solid var(--teal);}
.header-garland svg{flex-shrink:0;}
.header-body{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;}
.header-botanical{display:flex;align-items:flex-end;gap:4px;flex-shrink:0;}
.header-titles{flex:1;}
.header-title{font-size:17px;font-weight:700;color:var(--teal);letter-spacing:.2px;font-family:Georgia,serif;}
.header-sub{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px;}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green);transition:background .3s;}
.status-dot.red{background:var(--red);}.status-dot.orange{background:var(--amber);}
.btn-icon{background:none;border:none;cursor:pointer;font-size:20px;padding:5px;border-radius:8px;}
.btn-icon:hover{background:var(--accent-light);}

/* botanical strip between header and tabs */
.bstrip{display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:0 8px;background:var(--card);border-bottom:2px solid var(--teal);overflow:hidden;height:44px;}

/* ── Tabs ───────────────────────────────────────────────────────── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:600;color:var(--muted);white-space:nowrap;font-size:14px;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ── Pages ──────────────────────────────────────────────────────── */
.page{display:none;padding:18px;max-width:960px;margin:0 auto;}
.page.active{display:block;}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);color:var(--text);}
.search-box:focus{outline:2px solid var(--teal);border-color:transparent;}
select.filter{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);cursor:pointer;color:var(--text);}
.btn{padding:9px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.84;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:var(--border);color:var(--text);}
.btn-teal{background:var(--teal);color:#fff;}

/* ── Category groups ────────────────────────────────────────────── */
.cat-section{margin-bottom:26px;}
.cat-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--teal);padding:5px 2px 9px;border-bottom:1.5px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cat-count{font-size:11px;background:var(--accent-light);color:var(--accent);border-radius:10px;padding:1px 7px;font-weight:700;}

/* ── Recipe cards ───────────────────────────────────────────────── */
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .1s;}
.recipe-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.recipe-card .card-photo{width:100%;height:130px;object-fit:cover;display:block;}
.recipe-card .card-placeholder{width:100%;height:88px;display:flex;align-items:center;justify-content:center;font-size:38px;background:var(--accent-light);}
.recipe-card .card-body{padding:10px 12px;}
.recipe-card h3{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--text);}
.recipe-card .meta{font-size:11px;color:var(--muted);display:flex;gap:5px;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-light);color:var(--accent);}
.badge.teal{background:#e0eff5;color:var(--teal);}
.badge.green{background:#e8f4e8;color:var(--green);}
.badge.amber{background:#fff3e0;color:#c06010;}

/* ── Detail view ────────────────────────────────────────────────── */
.recipe-detail{display:none;}
.recipe-detail.active{display:block;}
.detail-photo{width:100%;max-height:300px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px;cursor:zoom-in;}
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;}
.detail-emoji{font-size:50px;}
.detail-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.detail-section h4{font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.detail-section p{white-space:pre-wrap;line-height:1.65;font-size:14px;}

/* ── Photo upload ───────────────────────────────────────────────── */
.photo-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .15s;display:block;color:var(--muted);}
.photo-upload-area:hover{border-color:var(--accent);background:var(--accent-light);}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;}
.photo-remove{font-size:12px;color:var(--red);cursor:pointer;margin-top:6px;display:none;}

/* ── Notes blocks editor ────────────────────────────────────────── */
.notes-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg);}
.notes-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.notes-block-hdr span{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;}
.notes-block-hdr button{background:none;border:none;cursor:pointer;font-size:11px;color:var(--red);padding:2px 7px;border-radius:6px;border:1px solid transparent;}
.notes-block-hdr button:hover{background:#fdeaea;border-color:var(--red);}
.notes-block textarea,.notes-block input[type=text],.notes-block input[type=url]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);resize:vertical;}
.notes-block textarea:focus,.notes-block input:focus{outline:2px solid var(--teal);border-color:transparent;}
.nb-url-label{font-size:11px;color:var(--muted);margin:6px 0 3px;}
.notes-add-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.notes-add-bar .btn{font-size:12px;padding:5px 12px;}

/* ── Carousel (notas) ───────────────────────────────────────────── */
.carousel-wrap{position:relative;margin-bottom:10px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.carousel-img{width:100%;max-height:280px;object-fit:contain;display:block;cursor:zoom-in;}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.82);border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.25);color:var(--text);}
.carousel-nav.prev{left:8px;}.carousel-nav.next{right:8px;}
.carousel-dots{display:flex;justify-content:center;gap:7px;margin-top:8px;margin-bottom:4px;}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:var(--border);border:none;cursor:pointer;padding:0;}
.carousel-dot.active{background:var(--accent);}

/* Notes blocks in detail view */
.notes-text-block{white-space:pre-wrap;line-height:1.65;font-size:14px;margin-bottom:10px;}
.notes-url-block{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--teal);text-decoration:none;margin-bottom:8px;background:#e8f2f7;max-width:100%;word-break:break-all;}
.notes-url-block:hover{opacity:.8;}

/* ── Refeições ──────────────────────────────────────────────────── */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.slot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;}
.slot-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.1);transform:translateY(-2px);}
.slot-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.slot-header .slot-icon{font-size:22px;}
.slot-header h3{font-size:15px;font-weight:700;flex:1;color:var(--teal);}
.slot-header .slot-count{font-size:12px;color:var(--muted);}
.slot-entries{padding:10px 12px;}
.slot-chip{display:inline-block;font-size:12px;padding:3px 9px;border-radius:20px;background:var(--bg);border:1px solid var(--border);margin:3px 3px 3px 0;color:var(--text);}
.slot-chip.linked{border-color:var(--teal);color:var(--teal);}
.slot-item-row{display:flex;align-items:center;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;gap:8px;border-radius:6px;transition:background .12s;}
.slot-item-row:last-child{border-bottom:none;}
.slot-item-row:hover{background:rgba(0,0,0,.04);}
.slot-item-row-name{flex:1;font-size:13px;color:var(--text);line-height:1.4;}
.slot-item-arrow{font-size:11px;color:var(--muted);flex-shrink:0;}
.slot-add-row{display:flex;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:12px;color:var(--teal);gap:4px;border-top:1px dashed var(--border);margin-top:4px;}
.slot-add-row:hover{opacity:.7;}
.slot-empty-hint{font-size:12px;color:var(--muted);padding:8px 0;font-style:italic;}
.btn-sm{font-size:13px;padding:7px 14px;}
.slot-add-btn-inline{background:none;border:1.5px solid var(--border);border-radius:50%;width:26px;height:26px;font-size:16px;cursor:pointer;color:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.slot-add-btn-inline:hover{background:#e8f2f7;border-color:var(--teal);}
.sc-peq{border-top:3px solid #f59e0b;}.sc-lm{border-top:3px solid var(--green);}
.sc-alm{border-top:3px solid var(--teal);}.sc-lt{border-top:3px solid var(--amber);}
.sc-jan{border-top:3px solid #9b7fd4;}.sc-sei{border-top:3px solid #e07a8a;}

/* ── Slot Modal — view ──────────────────────────────────────────── */
.sv-group{margin-bottom:12px;}
.sv-item{border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:12px 14px;}
.sv-item+.sv-recipe-box{border-radius:0 0 10px 10px;border-top:none;margin-top:0;}
.sv-name{font-size:15px;font-weight:700;color:var(--text);display:block;}
.sv-recipe-box{border:1px solid var(--teal);border-radius:10px;background:#f0f7f4;padding:11px 14px;margin-top:6px;}
.sv-recipe-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--teal);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.sv-ingr{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.6;}

/* ── Slot Modal — edit ──────────────────────────────────────────── */
.se-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.se-input-wrap{flex:1;}
.se-name{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);font-family:inherit;color:var(--text);}
.se-name:focus{outline:2px solid var(--teal);border-color:transparent;}
.se-recipe-sel{width:100%;padding:9px 12px;border:1.5px solid var(--teal);border-radius:8px;font-size:14px;background:#e8f2f7;font-family:inherit;color:var(--teal);font-weight:600;}
.se-recipe-sel:focus{outline:2px solid var(--teal);border-color:transparent;}
.se-toggle{flex-shrink:0;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;font-size:13px;color:var(--muted);white-space:nowrap;}
.se-toggle:hover{border-color:var(--teal);color:var(--teal);}
.se-toggle.active{border-color:var(--teal);background:#e8f2f7;color:var(--teal);}
.se-rm{flex-shrink:0;width:30px;height:30px;border:none;border-radius:8px;background:none;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.se-rm:hover{background:#fdeaea;color:var(--red);}
.se-add-btn{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--muted);margin-top:2px;}
.se-add-btn:hover{border-color:var(--teal);color:var(--teal);background:#e8f2f7;}

/* ── Modal ──────────────────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(42,60,42,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:24px;border:1px solid var(--border);}
.modal h2{font-size:17px;margin-bottom:18px;color:var(--teal);font-family:Georgia,serif;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--teal);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);font-family:inherit;resize:vertical;color:var(--text);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--teal);border-color:transparent;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-group label{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);font-weight:normal;text-transform:none;letter-spacing:0;color:var(--text);}
.radio-group label:has(input:checked){border-color:var(--teal);background:#e8f2f7;color:var(--teal);}
.settings-row{display:flex;gap:8px;align-items:center;}.settings-row input{flex:1;}
.test-result{font-size:12px;margin-top:6px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .big{font-size:40px;margin-bottom:10px;}
.cat-input-wrap{display:flex;gap:6px;}.cat-input-wrap input{flex:1;}

/* ── Notas ──────────────────────────────────────────────────────── */
.notes-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.note-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:box-shadow .15s,transform .1s;border-left:3px solid var(--teal);}
.note-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.note-card h3{font-size:14px;font-weight:700;margin-bottom:5px;color:var(--text);}
.note-card .note-preview{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.note-card .note-date{font-size:11px;color:var(--muted);}
.note-card .note-has-media{font-size:11px;color:var(--teal);margin-top:4px;}

/* ── Carousel editor (thumbnails) ───────────────────────────────── */
.carousel-editor-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.carousel-thumb{position:relative;width:76px;}
.carousel-thumb .img-wrap{width:76px;height:76px;}
.carousel-thumb img{width:76px;height:76px;object-fit:cover;border-radius:6px;cursor:pointer;display:block;}
.carousel-thumb-rm{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;}
.carousel-thumb-add{width:76px;height:76px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted);cursor:pointer;flex-shrink:0;}
.carousel-thumb-add:hover{border-color:var(--accent);color:var(--accent);}
.carousel-title{font-size:13px;font-weight:700;color:var(--teal);margin:10px 0 4px;letter-spacing:.2px;}

/* ── Image copy/paste overlay ───────────────────────────────────── */
.img-wrap{position:relative;display:block;}
.img-copy-btn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.88);border:none;border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;opacity:0;transition:opacity .15s;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;}
.img-wrap:hover .img-copy-btn,.carousel-wrap:hover .img-copy-btn{opacity:1;}
.paste-hint{font-size:11px;color:var(--muted);margin-top:4px;text-align:center;}

/* ── Lightbox ───────────────────────────────────────────────────── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain;}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <!-- garland strip -->
  <div class="header-garland" id="headerGarland"></div>
  <!-- main row -->
  <div class="header-body">
    <div class="header-botanical" id="headerBotLeft"></div>
    <div class="header-titles">
      <div class="header-title">As Minhas Receitas</div>
      <div class="header-sub">de Susana</div>
    </div>
    <div class="header-actions">
      <span id="statusDot" class="status-dot red"></span>
      <button class="btn-icon" onclick="openSettings()" title="Configurações">⚙️</button>
    </div>
  </div>
</header>

<!-- botanical strip -->
<div class="bstrip" id="bstrip"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('receitas')">📖 Receitas</div>
  <div class="tab" onclick="showTab('refeicoes')">🥗 Refeições</div>
  <div class="tab" onclick="showTab('notas')">📓 Notas</div>
</div>

<!-- ═══ RECEITAS ═══ -->
<div id="page-receitas" class="page active">
  <div id="view-list">
    <div class="toolbar">
      <input id="searchInput" class="search-box" placeholder="🔍 Pesquisar receitas..." oninput="renderRecipes()"/>
      <select id="filterCat" class="filter" onchange="renderRecipes()">
        <option value="">Todas as categorias</option>
      </select>
      <button class="btn btn-ghost" onclick="exportAllPDF(this)" title="Exportar todas as receitas para PDF">📄 Exportar</button>
      <button class="btn btn-primary" onclick="openRecipeModal()">+ Nova Receita</button>
    </div>
    <div id="recipesContainer"></div>
  </div>

  <div id="view-detail" class="recipe-detail">
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="showList()">← Voltar</button>
      <div style="flex:1"></div>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑 Apagar</button>
      <button class="btn btn-ghost" onclick="exportRecipePDF(currentRecipe,this)">📄 PDF</button>
      <button class="btn btn-teal" onclick="editCurrent()">✏️ Editar</button>
    </div>
    <div class="img-wrap" id="detailPhotoWrap" style="display:none">
      <img id="detailPhoto" class="detail-photo" src="" alt="foto" onclick="openLightbox(this.src)"/>
      <button class="img-copy-btn" onclick="copyImg(document.getElementById('detailPhoto').src)">📋 Copiar</button>
    </div>
    <div class="detail-header">
      <div id="detailEmoji" class="detail-emoji">🍽️</div>
      <div><h2 id="detailName" style="font-family:Georgia,serif;color:var(--teal)"></h2><div class="detail-meta" id="detailMeta"></div></div>
    </div>
    <div class="detail-section"><h4>🧂 Ingredientes</h4><p id="detailIngredients"></p></div>
    <div class="detail-section"><h4>👨‍🍳 Preparação</h4><p id="detailPreparation"></p></div>
    <div id="detailNotesSection" class="detail-section" style="display:none">
      <h4>📝 Notas</h4>
      <div id="detailNotes"></div>
    </div>
  </div>
</div>

<!-- ═══ REFEIÇÕES ═══ -->
<div id="page-refeicoes" class="page">
  <div class="toolbar">
    <span style="font-size:13px;color:var(--muted)">Organiza as tuas refeições diárias por tipo</span>
  </div>
  <div id="slotGrid" class="slot-grid"></div>

<script>
// ─── Botanical SVG helpers ────────────────────────────────────────────────────

function svgLeaf(w=16,h=26){return`<svg width="${w}" height="${h}" viewBox="0 0 16 26" fill="none" xmlns="http://www.w3.org/2000/svg">

// garland: thin line with dangling small leaves

  const el=document.getElementById('headerGarland');

  let html='';

}

// botanical strip below header

// ─── State ────────────────────────────────────────────────────────────────────
let recipes=[], refeicoes={}, categories=[], currentRecipe=null;
let notesBlocks=[], notesPhotoTargetIdx=-1;
let appNotes=[], noteBlocks=[], notePhotoTargetIdx=-1;
const carouselState={}; // {cid: {images:[], idx:0}}

const SLOTS=[
  {key:'peq-almoço',  label:'Pequeno-almoço',icon:'☀️', cls:'sc-peq'},
  {key:'lanche-manhã',label:'Lanche Manhã',  icon:'🍎', cls:'sc-lm'},
  {key:'almoço',      label:'Almoço',         icon:'🌿', cls:'sc-alm'},
  {key:'lanche-tarde',label:'Lanche Tarde',   icon:'🍊', cls:'sc-lt'},
  {key:'jantar',      label:'Jantar',          icon:'🌙', cls:'sc-jan'},
  {key:'seia',        label:'Seia',            icon:'🌛', cls:'sc-sei'},
];
const DEFAULT_CATS=['Sopas','Carnes','Peixe','Vegetariano','Massas','Saladas','Sobremesas','Snacks','Pequeno-almoço','Bebidas','Outro'];

// ─── Config ───────────────────────────────────────────────────────────────────
const getApiUrl=()=>localStorage.getItem('api_url')||'';
const getApiKey=()=>localStorage.getItem('api_key')||'';
const hdrs=(x={})=>{const h={'Content-Type':'application/json',...x};if(getApiKey())h['X-API-Key']=getApiKey();return h;};
function setStatus(s){const d=document.getElementById('statusDot');d.className='status-dot'+(s!=='green'?' '+s:'');}

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiFetch(path,opts={},timeoutMs=30000){
  const base=getApiUrl();if(!base)throw new Error('Sem URL');
  setStatus('orange');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const res=await fetch(base.replace(/\/$/,'')+path,{...opts,headers:hdrs(opts.headers||{}),signal:ctrl.signal});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    setStatus('green');
    return res.status===204?null:res.json();
  }finally{clearTimeout(tid);}
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  if(!getApiUrl()){loadLocal();setStatus('red');render();return;}
  try{
    [recipes,refeicoes,categories]=await Promise.all([
      apiFetch('/recipes'),apiFetch('/refeicoes'),apiFetch('/categories')
    ]);
    // notas: endpoint opcional — não bloqueia se o backend ainda não foi atualizado
    try{appNotes=await apiFetch('/notes');}
    catch{appNotes=JSON.parse(localStorage.getItem('appNotes')||'[]');}
    saveLocal();setStatus('green');
  }catch{loadLocal();setStatus('red');}
  render();
}
function loadLocal(){
  try{recipes=JSON.parse(localStorage.getItem('recipes')||'[]');}catch{recipes=[];}
  try{refeicoes=JSON.parse(localStorage.getItem('refeicoes')||'{}');}catch{refeicoes={};}
  try{categories=JSON.parse(localStorage.getItem('categories')||'null')||[...DEFAULT_CATS];}catch{categories=[...DEFAULT_CATS];}
  try{appNotes=JSON.parse(localStorage.getItem('appNotes')||'[]');}catch{appNotes=[];}
}
function saveLocal(){
  localStorage.setItem('recipes',JSON.stringify(recipes));
  localStorage.setItem('refeicoes',JSON.stringify(refeicoes));
  localStorage.setItem('categories',JSON.stringify(categories));
  localStorage.setItem('appNotes',JSON.stringify(appNotes));
}
function render(){renderRecipes();renderSlots();renderNotesList();populateCatFilter();populateCatDatalist();}

function populateCatFilter(){
  const sel=document.getElementById('filterCat');const cur=sel.value;
  sel.innerHTML='<option value="">Todas as categorias</option>'+
    [...new Set([...categories,...recipes.map(r=>r.category).filter(Boolean)])].sort()
    .map(c=>`<option${cur===c?' selected':''}>${esc(c)}</option>`).join('');
}
function populateCatDatalist(){
  document.getElementById('catDatalist').innerHTML=
    [...new Set([...categories,...recipes.map(r=>r.category).filter(Boolean)])].sort()
    .map(c=>`<option value="${esc(c)}">`).join('');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
const TAB_ORDER=['receitas','refeicoes','notas'];
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===TAB_ORDER.indexOf(t)));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
}

// ─── Receitas ─────────────────────────────────────────────────────────────────
function recipeCardHtml(r){return`
  <div class="recipe-card" onclick="showDetail('${r.id}')">
    ${r.photo?`<img class="card-photo" src="${r.photo}" alt="${esc(r.name)}" loading="lazy"/>`
             :`<div class="card-placeholder">${r.emoji||'🍽️'}</div>`}
    <div class="card-body">
      <h3>${esc(r.name)}</h3>
      <div class="meta">
        <span>${diffIcon(r.difficulty)}</span>
        ${r.time?`<span>⏱ ${esc(r.time)}</span>`:''}
        ${r.servings?`<span>👥 ${r.servings}</span>`:''}
        ${r.calories?`<span>🔥 ${r.calories} kcal</span>`:''}
      </div>
    </div>
  </div>`;}

function renderRecipes(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const catFilter=document.getElementById('filterCat').value;
  let list=recipes.filter(r=>
    (!q||r.name.toLowerCase().includes(q)||(r.ingredients||'').toLowerCase().includes(q))&&
    (!catFilter||r.category===catFilter));
  const container=document.getElementById('recipesContainer');
  if(!list.length){container.innerHTML='<div class="empty"><div class="big">🍊</div><p>Sem receitas. Adiciona a primeira!</p></div>';return;}
  const grouped={};
  list.forEach(r=>{const c=r.category||'Outro';if(!grouped[c])grouped[c]=[];grouped[c].push(r);});
  container.innerHTML=Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'pt')).map(cat=>`
    <div class="cat-section">
      <div class="cat-section-title">${esc(cat)}<span class="cat-count">${grouped[cat].length}</span></div>
      <div class="recipes-grid">${grouped[cat].map(recipeCardHtml).join('')}</div>
    </div>`).join('');
}

function diffIcon(d){return{fácil:'🟢',médio:'🟡',difícil:'🔴'}[d]||'';}
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escRaw(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── Detail ───────────────────────────────────────────────────────────────────
function showDetail(id){
  currentRecipe=recipes.find(r=>r.id===id);if(!currentRecipe)return;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').classList.add('active');
  const dp=document.getElementById('detailPhoto');
  const dpw=document.getElementById('detailPhotoWrap');
  if(currentRecipe.photo){dp.src=currentRecipe.photo;dpw.style.display='block';}else dpw.style.display='none';
  document.getElementById('detailEmoji').textContent=currentRecipe.emoji||'🍽️';
  document.getElementById('detailEmoji').style.display=currentRecipe.photo?'none':'block';
  document.getElementById('detailName').textContent=currentRecipe.name;
  document.getElementById('detailMeta').innerHTML=`
    <span class="badge">${esc(currentRecipe.category||'Outro')}</span>
    ${currentRecipe.time?`<span class="badge teal">⏱ ${esc(currentRecipe.time)}</span>`:''}
    ${currentRecipe.servings?`<span class="badge green">👥 ${currentRecipe.servings} porções</span>`:''}
    ${currentRecipe.calories?`<span class="badge amber">🔥 ${currentRecipe.calories} kcal/porção</span>`:''}
    <span class="badge" style="background:var(--bg)">${diffIcon(currentRecipe.difficulty)} ${esc(currentRecipe.difficulty||'')}</span>`;
  document.getElementById('detailIngredients').textContent=currentRecipe.ingredients||'—';
  document.getElementById('detailPreparation').textContent=currentRecipe.preparation||'—';
  const ns=document.getElementById('detailNotesSection');
  const notesHtml=buildNotesHtml(currentRecipe.notes);
  if(notesHtml){ns.style.display='block';document.getElementById('detailNotes').innerHTML=notesHtml;}
  else ns.style.display='none';
}

// ─── Carousel engine (multi-instance) ────────────────────────────────────────
function renderCarouselHtml(cid,images,name){
  carouselState[cid]={images:[...images],idx:0};
  const show=images.length>1;
  return`${name?`<div class="carousel-title">${esc(name)}</div>`:''}
  <div class="carousel-wrap" id="cw-${cid}">
    <img class="carousel-img" src="${images[0]}" alt="" onclick="openLightbox(this.src)"/>
    <button class="carousel-nav prev" onclick="stepCarousel('${cid}',-1)" style="${show?'':'display:none'}">‹</button>
    <button class="carousel-nav next" onclick="stepCarousel('${cid}',1)" style="${show?'':'display:none'}">›</button>
    <button class="img-copy-btn" onclick="copyImg(carouselState['${cid}']?.images[carouselState['${cid}']?.idx])">📋 Copiar</button>
  </div>
  <div class="carousel-dots" id="cd-${cid}">${images.map((_,i)=>`<button class="carousel-dot${i===0?' active':''}" onclick="goCarousel('${cid}',${i})"></button>`).join('')}</div>`;
}
function stepCarousel(cid,d){const s=carouselState[cid];if(!s)return;s.idx=(s.idx+d+s.images.length)%s.images.length;refreshCarousel(cid);}
function goCarousel(cid,i){const s=carouselState[cid];if(!s)return;s.idx=i;refreshCarousel(cid);}
function refreshCarousel(cid){
  const s=carouselState[cid];if(!s)return;
  const wrap=document.getElementById('cw-'+cid);if(!wrap)return;
  const img=wrap.querySelector('.carousel-img');if(img)img.src=s.images[s.idx];
  const dots=document.getElementById('cd-'+cid);
  if(dots)dots.innerHTML=s.images.map((_,i)=>`<button class="carousel-dot${i===s.idx?' active':''}" onclick="goCarousel('${cid}',${i})"></button>`).join('');
  const show=s.images.length>1;
  const prev=wrap.querySelector('.carousel-nav.prev');const next=wrap.querySelector('.carousel-nav.next');
  if(prev)prev.style.display=show?'':'none';if(next)next.style.display=show?'':'none';
}

// Constrói o HTML das notas respeitando a ordem dos blocos.
function buildNotesHtml(notes){
  if(!notes)return'';
  let blocks;
  if(Array.isArray(notes))blocks=notes;
  else if(typeof notes==='string'&&notes.trim())blocks=[{type:'text',content:notes}];
  else return'';
  // backward compat: legacy image blocks → unnamed carousel
  const legacyImgs=blocks.filter(b=>b.type==='image'&&b.data).map(b=>b.data);
  let legacyDone=false;
  return blocks.map((b,i)=>{
    if(b.type==='text')return`<p class="notes-text-block">${escRaw(b.content||'')}</p>`;
    if(b.type==='image'&&b.data){
      if(!legacyDone&&legacyImgs.length){legacyDone=true;return renderCarouselHtml('legacy',legacyImgs,'');}
      return'';
    }
    if(b.type==='carousel'&&b.images&&b.images.length)return renderCarouselHtml('c'+i,b.images,b.name||'');
    if(b.type==='url'&&b.url)return`<a href="${esc(b.url)}" target="_blank" rel="noopener" class="notes-url-block">🔗 ${esc(b.label||b.url)}</a><br/>`;
    return'';
  }).join('');
}

// ─── Image copy / paste helpers ───────────────────────────────────────────────
let pasteImageTarget=null;

function compressImageFile(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=800;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',.75));
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  });
}

async function copyImg(dataUrl){
  if(!dataUrl)return;
  try{
    const res=await fetch(dataUrl);const blob=await res.blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
  }catch{
    // fallback: convert to PNG blob
    try{
      const img=new Image();img.src=dataUrl;
      await new Promise(r=>{img.onload=r;});
      const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      await new Promise(r=>c.toBlob(async b=>{
        await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);r();
      },'image/png'));
    }catch(e){alert('Não foi possível copiar a imagem: '+e.message);}
  }
}

async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('O nome é obrigatório.');return;}
  const btn=document.querySelector('#recipeOverlay .btn-primary');
  const orig=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='⏳ A guardar...';}
  const cat=document.getElementById('fCat').value.trim()||'Outro';
  const photo=document.getElementById('fPhoto').value||null;
  const calVal=document.getElementById('fCalories').value;
  const calories=calVal?parseInt(calVal):null;
  // sincroniza textareas antes de guardar
  document.querySelectorAll('#notesBlockList .notes-block').forEach((el,i)=>{
    const ta=el.querySelector('textarea');if(ta&&notesBlocks[i])notesBlocks[i].content=ta.value;
  });
  const notes=notesBlocks.length>0?notesBlocks:null;
  const body={name,emoji:document.getElementById('fEmoji').value.trim()||'🍽️',
    category:cat,difficulty:document.getElementById('fDiff').value,
    time:document.getElementById('fTime').value.trim(),
    servings:parseInt(document.getElementById('fServings').value)||4,
    calories,ingredients:document.getElementById('fIngredients').value.trim(),
    preparation:document.getElementById('fPrep').value.trim(),notes,photo};
  const id=document.getElementById('editId').value;
  if(cat&&!categories.includes(cat))categories.push(cat);
  try{
    if(id){const u=await apiFetch(`/recipes/${id}`,{method:'PUT',body:JSON.stringify(body)});const i=recipes.findIndex(r=>r.id===id);if(i>=0)recipes[i]=u;currentRecipe=u;}
    else{const c=await apiFetch('/recipes',{method:'POST',body:JSON.stringify(body)});recipes.push(c);}
    try{categories=await apiFetch('/categories');}catch{}
  }catch{
    if(id){const i=recipes.findIndex(r=>r.id===id);if(i>=0){recipes[i]={...recipes[i],...body};currentRecipe=recipes[i];}}
    else{const r={...body,id:crypto.randomUUID(),created_at:new Date().toISOString()};recipes.push(r);}
  }finally{
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }
  saveLocal();closeModal('recipeOverlay');
  if(id)showDetail(id);else showList();
  render();
}

async function deleteCurrent(){

  try{await apiFetch(`/recipes/${currentRecipe.id}`,{method:'DELETE'});}catch{}

function renderNotesList(){
  const q=(document.getElementById('notesSearch')?.value||'').toLowerCase();
  const list=appNotes.filter(n=>!q||n.title.toLowerCase().includes(q)||notePreview(n.blocks).toLowerCase().includes(q));
  const el=document.getElementById('notesContainer');if(!el)return;
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="big">📓</div><p>'+(appNotes.length?'Sem resultados.':'Ainda sem notas. Cria a primeira!')+'</p></div>';
    return;
  }
  el.innerHTML=`<div class="notes-list">${list.map(n=>{
    const prev=notePreview(n.blocks);
    const media=noteHasMedia(n.blocks);
    return`<div class="note-card" onclick="openNoteModal(appNotes.find(x=>x.id==='${n.id}'))">
      <h3>${esc(n.title)}</h3>
      ${prev?`<p class="note-preview">${esc(prev)}</p>`:''}
      ${media?`<div class="note-has-media">📎 tem media</div>`:''}
      <div class="note-date">${formatDate(n.created_at)}</div>
    </div>`;
  }).join('')}</div>`;
}

// ─── Note block editor (general notes) ───────────────────────────────────────
function renderNoteEditor(){
  document.getElementById('noteBlockList').innerHTML=noteBlocks.map((b,i)=>{
    if(b.type==='text')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📝 Texto</span><button type="button" onclick="removeNoteBlock(${i})">✕ Remover</button></div>
        <textarea rows="3" oninput="noteBlocks[${i}].content=this.value">${escRaw(b.content||'')}</textarea>
      </div>`;
    if(b.type==='image')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📷 Foto</span><button type="button" onclick="removeNoteBlock(${i})">✕ Remover</button></div>
        ${b.data
          ?`<div class="img-wrap"><img src="${b.data}" style="max-width:100%;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="pickNotePhoto(${i})" title="Clica para trocar"/>
            <button class="img-copy-btn" onclick="copyImg(noteBlocks[${i}].data)">📋 Copiar</button></div>
            <div style="font-size:11px;color:var(--muted)">Clica para trocar · Ctrl+V para colar</div>`
          :`<div class="photo-upload-area" onclick="pickNotePhoto(${i})">Clica para adicionar foto</div>
            <div class="paste-hint">Ctrl+V para colar</div>`}
      </div>`;
    if(b.type==='carousel')return carouselEditorHtml(noteBlocks,'noteBlocks',i,'pickNoteCarouselPhoto','removeNoteBlock','addNoteBlock');
    if(b.type==='url')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>🔗 URL</span><button type="button" onclick="removeNoteBlock(${i})">✕ Remover</button></div>
        <input type="url" placeholder="https://..." value="${esc(b.url||'')}" oninput="noteBlocks[${i}].url=this.value" style="margin-bottom:6px"/>
        <div class="nb-url-label">Texto do link (opcional)</div>
        <input type="text" placeholder="ex: Artigo interessante" value="${esc(b.label||'')}" oninput="noteBlocks[${i}].label=this.value"/>
      </div>`;
    return'';
  }).join('');
}
function addNoteBlock(type){
  if(type==='text')noteBlocks.push({type:'text',content:''});
  else if(type==='image')noteBlocks.push({type:'image',data:null});
  else if(type==='url')noteBlocks.push({type:'url',url:'',label:''});
  else if(type==='carousel')noteBlocks.push({type:'carousel',name:'',images:[]});
  renderNoteEditor();
}
function removeNoteBlock(i){noteBlocks.splice(i,1);renderNoteEditor();}
function removeNoteBlockImg(blockIdx,imgIdx){noteBlocks[blockIdx].images.splice(imgIdx,1);renderNoteEditor();}
function pickNotePhoto(i){
  pasteImageTarget=dataUrl=>{noteBlocks[i].data=dataUrl;renderNoteEditor();};
  document.getElementById('notePhotoInput').value='';
  document.getElementById('notePhotoInput').click();
}
function pickNoteCarouselPhoto(blockIdx){
  pasteImageTarget=dataUrl=>{noteBlocks[blockIdx].images.push(dataUrl);renderNoteEditor();};
  document.getElementById('notePhotoInput').value='';
  document.getElementById('notePhotoInput').click();
}
function pickNoteCarouselPhotoAt(blockIdx,imgIdx){
  pasteImageTarget=dataUrl=>{noteBlocks[blockIdx].images[imgIdx]=dataUrl;renderNoteEditor();};
  document.getElementById('notePhotoInput').value='';
  document.getElementById('notePhotoInput').click();
}
function onNotePhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  compressImageFile(file).then(dataUrl=>{if(pasteImageTarget)pasteImageTarget(dataUrl);});
}

// ─── Note modal ───────────────────────────────────────────────────────────────
function openNoteModal(n=null){
  document.getElementById('noteModalTitle').textContent=n?'Editar Nota':'Nova Nota';
  document.getElementById('noteEditId').value=n?n.id:'';
  document.getElementById('nTitle').value=n?n.title:'';
  document.getElementById('noteDeleteBtn').style.display=n?'':'none';
  noteBlocks=n&&n.blocks?(Array.isArray(n.blocks)?JSON.parse(JSON.stringify(n.blocks)):[{type:'text',content:n.blocks}]):[];
  renderNoteEditor();
  // paste numa nota nova adiciona bloco de imagem; numa existente substitui o último bloco de imagem ou adiciona
  pasteImageTarget=dataUrl=>{
    const last=noteBlocks.map((b,i)=>({b,i})).reverse().find(x=>x.b.type==='image');
    if(last&&!last.b.data){noteBlocks[last.i].data=dataUrl;}
    else{noteBlocks.push({type:'image',data:dataUrl});}
    renderNoteEditor();
  };
  openModal('noteOverlay');
  setTimeout(()=>document.getElementById('nTitle').focus(),120);
}

async function saveNote(){
  const title=document.getElementById('nTitle').value.trim();
  if(!title){alert('O título é obrigatório.');return;}
  const btn=document.querySelector('#noteOverlay .btn-primary');
  const orig=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='⏳ A guardar...';}
  // sync textareas
  document.querySelectorAll('#noteBlockList .notes-block').forEach((el,i)=>{
    const ta=el.querySelector('textarea');if(ta&&noteBlocks[i])noteBlocks[i].content=ta.value;
  });
  const blocks=noteBlocks.length>0?noteBlocks:null;
  const body={title,blocks};
  const id=document.getElementById('noteEditId').value;
  try{
    if(id){
      const u=await apiFetch(`/notes/${id}`,{method:'PUT',body:JSON.stringify(body)});
      const i=appNotes.findIndex(n=>n.id===id);if(i>=0)appNotes[i]=u;
    }else{
      const c=await apiFetch('/notes',{method:'POST',body:JSON.stringify(body)});
      appNotes.unshift(c);
    }
  }catch{
    if(id){const i=appNotes.findIndex(n=>n.id===id);if(i>=0)appNotes[i]={...appNotes[i],...body};}
    else appNotes.unshift({id:crypto.randomUUID(),title,blocks,created_at:new Date().toISOString()});
  }finally{
    if(btn){btn.disabled=false;btn.textContent=orig;}
  }
  saveLocal();closeModal('noteOverlay');renderNotesList();
}

async function deleteNote(){
  const id=document.getElementById('noteEditId').value;if(!id)return;
  const n=appNotes.find(x=>x.id===id);
  if(!confirm(`Apagar a nota "${n?.title||''}"?\nEsta ação não pode ser desfeita.`))return;
  try{await apiFetch(`/notes/${id}`,{method:'DELETE'});}catch{}
  appNotes=appNotes.filter(x=>x.id!==id);
  saveLocal();closeModal('noteOverlay');renderNotesList();
}

// ─── PDF Export ───────────────────────────────────────────────────────────────
const PC={
  cream:[245,239,216], card:[254,252,240], teal:[42,88,104],
  accent:[192,88,24], green:[74,120,64], red:[176,24,32],
  border:[223,212,184], muted:[122,136,112], amber:[232,138,24],
  white:[255,255,255], dark:[55,55,55]
};

async function loadJsPDF(){
  if(window.jspdf)return;
  await new Promise((ok,fail)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=ok;s.onerror=()=>fail(new Error('Falha ao carregar jsPDF'));
    document.head.appendChild(s);
  });
}

/* ── botanical drawing primitives ── */
function pdOrange(doc,cx,cy,r=5){
  doc.setFillColor(...PC.green);
  doc.ellipse(cx+r*.42,cy-r-1.2,r*.55,r*.28,'F');
  doc.setFillColor(232,120,40);doc.circle(cx,cy,r,'F');
  doc.setFillColor(244,160,80);doc.circle(cx-r*.3,cy-r*.3,r*.28,'F');
}
function pdFlower(doc,cx,cy,r=4){
  doc.setFillColor(...PC.red);
  for(let i=0;i<5;i++){
    const a=(i*72-90)*Math.PI/180;
    doc.circle(cx+Math.cos(a)*r*.62,cy+Math.sin(a)*r*.62,r*.42,'F');
  }
  doc.setFillColor(240,200,60);doc.circle(cx,cy,r*.38,'F');
}
function pdLeaf(doc,cx,cy,r=4){
  doc.setFillColor(...PC.green);doc.ellipse(cx,cy,r*.32,r,'F');
}
function pdBorderStrip(doc,y,pw){
  doc.setDrawColor(...PC.teal);doc.setLineWidth(.5);
  doc.line(15,y,pw-15,y);
  for(let x=22,i=0;x<pw-15;x+=20,i++){
    if(i%3===0)pdOrange(doc,x,y-4,3);
    else if(i%3===1)pdFlower(doc,x,y-4,2.8);
    else pdLeaf(doc,x,y-4.5,3.2);
  }
}

/* ── bouquet / arrangement of motifs ── */
function pdBouquet(doc,cx,cy){
  // stems
  doc.setDrawColor(90,110,65);doc.setLineWidth(0.5);
  doc.line(cx,cy+32,cx,cy-18);
  doc.line(cx,cy+12,cx-32,cy-12);doc.line(cx,cy+12,cx+32,cy-12);
  doc.line(cx,cy+20,cx-20,cy+4);doc.line(cx,cy+20,cx+20,cy+4);
  doc.line(cx-10,cy+26,cx-26,cy+37);doc.line(cx+10,cy+26,cx+26,cy+37);
  // leaves
  pdLeaf(doc,cx-38,cy-10,7);pdLeaf(doc,cx+38,cy-10,7);
  pdLeaf(doc,cx-22,cy+5,5);pdLeaf(doc,cx+22,cy+5,5);
  pdLeaf(doc,cx-28,cy+38,5);pdLeaf(doc,cx+28,cy+38,5);
  pdLeaf(doc,cx,cy-22,6);pdLeaf(doc,cx-11,cy-15,4);pdLeaf(doc,cx+11,cy-15,4);
  // oranges
  pdOrange(doc,cx,cy-5,10);
  pdOrange(doc,cx-25,cy-7,9);pdOrange(doc,cx+25,cy-7,9);
  pdOrange(doc,cx-44,cy+3,7);pdOrange(doc,cx+44,cy+3,7);
  pdOrange(doc,cx-14,cy+16,7);pdOrange(doc,cx+14,cy+16,7);
  // flowers
  pdFlower(doc,cx-12,cy-22,8);pdFlower(doc,cx+12,cy-22,8);
  pdFlower(doc,cx-34,cy+17,7);pdFlower(doc,cx+34,cy+17,7);
  pdFlower(doc,cx,cy+31,6);
}

/* ── corner botanical cluster ── */
function pdCornerCluster(doc,cx,cy,flip){
  pdLeaf(doc,cx+flip*5,cy-3,5);
  pdOrange(doc,cx,cy+6,5);
  pdFlower(doc,cx+flip*11,cy+5,4);
  pdLeaf(doc,cx-flip*4,cy+8,4);
}

/* ── elegant double border + corner accent squares ── */
function pdElegantBorder(doc,pw,ph){
  doc.setDrawColor(...PC.teal);doc.setLineWidth(1.5);
  doc.rect(8,8,pw-16,ph-16);
  doc.setLineWidth(0.35);doc.rect(12,12,pw-24,ph-24);
  doc.setFillColor(...PC.accent);
  [[7,7],[pw-11,7],[7,ph-11],[pw-11,ph-11]].forEach(([x,y])=>doc.rect(x,y,4,4,'F'));
}

/* ── cover page ── */
function pdDrawCover(doc,pw,ph,m,count){
  doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
  pdElegantBorder(doc,pw,ph);
  pdCornerCluster(doc,22,24,1);pdCornerCluster(doc,pw-22,24,-1);
  pdCornerCluster(doc,22,ph-24,1);pdCornerCluster(doc,pw-22,ph-24,-1);
  // central bouquet
  pdBouquet(doc,pw/2,106);
  // dividers
  doc.setDrawColor(...PC.teal);doc.setLineWidth(0.9);doc.line(30,156,pw-30,156);
  doc.setLineWidth(0.3);doc.line(36,159,pw-36,159);
  // title
  doc.setFont('helvetica','bold');doc.setFontSize(29);doc.setTextColor(...PC.teal);
  doc.text('As Minhas Receitas',pw/2,175,{align:'center'});
  // subtitle
  doc.setFont('helvetica','italic');doc.setFontSize(15);doc.setTextColor(...PC.accent);
  doc.text('de Susana',pw/2,189,{align:'center'});
  // flanking motifs
  pdOrange(doc,pw/2-48,181,5);pdOrange(doc,pw/2+48,181,5);
  pdFlower(doc,pw/2-60,177,4);pdFlower(doc,pw/2+60,177,4);
  // dividers below title
  doc.setDrawColor(...PC.teal);doc.setLineWidth(0.3);doc.line(36,196,pw-36,196);
  doc.setLineWidth(0.9);doc.line(30,199,pw-30,199);
  // count & date
  doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor(...PC.muted);
  doc.text(count+' receitas',pw/2,213,{align:'center'});
  doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'}),pw/2,223,{align:'center'});
}

/* ── category separator page (simple, secondary to cover) ── */
function pdDrawCategory(doc,cat,count,pw,ph){
  doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
  // single clean border
  doc.setDrawColor(...PC.teal);doc.setLineWidth(1.0);
  doc.rect(10,10,pw-20,ph-20);
  // accent corner squares
  doc.setFillColor(...PC.accent);
  [[9,9],[pw-13,9],[9,ph-13],[pw-13,ph-13]].forEach(([x,y])=>doc.rect(x,y,4,4,'F'));
  // small botanical strip at top (inside border)
  pdBorderStrip(doc,30,pw);
  // vertical center — category name
  const cl=doc.splitTextToSize(cat,pw-50);
  const fs=cl.length>1?30:38;
  doc.setFont('helvetica','bold');doc.setFontSize(fs);doc.setTextColor(...PC.teal);
  const catY=ph/2-(cl.length-1)*(fs*0.42)/2;
  cl.forEach((line,i)=>doc.text(line,pw/2,catY+i*fs*0.42,{align:'center'}));
  const lastY=catY+(cl.length-1)*fs*0.42;
  // thin accent bar under name
  doc.setFillColor(...PC.accent);
  const barW=Math.min(doc.getTextWidth(cl[0])+10,pw-50);
  doc.rect((pw-barW)/2,lastY+5,barW,1.5,'F');
  // count
  doc.setFont('helvetica','italic');doc.setFontSize(11);doc.setTextColor(...PC.muted);
  doc.text(count+' receita'+(count!==1?'s':''),pw/2,lastY+18,{align:'center'});
  // small botanical strip at bottom (inside border)
  pdBorderStrip(doc,ph-18,pw);
}

/* ── layout helpers ── */
function pdHeading(doc,label,y,m){
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.setFillColor(...PC.teal);
  const tw=doc.getTextWidth(label)+5;
  doc.roundedRect(m,y-4,tw,6.5,1,1,'F');
  doc.setTextColor(...PC.white);doc.text(label,m+2.5,y+.5);
  return y+9;
}
function pdBody(doc,text,y,pw,m){
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.setTextColor(...PC.dark);
  const lines=doc.splitTextToSize(text||'—',pw-m*2);
  doc.text(lines,m,y);
  return y+lines.length*5.2+2;
}
function pdContinuationPage(doc,name){
  doc.addPage();
  doc.setFillColor(...PC.cream);doc.rect(0,0,210,297,'F');
  doc.setFont('helvetica','italic');doc.setFontSize(8);
  doc.setTextColor(...PC.muted);doc.text(name,15,10);
  doc.setDrawColor(...PC.border);doc.setLineWidth(.3);doc.line(15,12,195,12);
  return 18;
}
function needY(doc,y,need,name){
  return(y+need>275)?pdContinuationPage(doc,name):y;
}

/* ── detect image format from data URL ── */
function imgFmt(dataUrl){
  if(!dataUrl)return'JPEG';
  if(dataUrl.startsWith('data:image/png'))return'PNG';
  if(dataUrl.startsWith('data:image/webp'))return'WEBP';
  return'JPEG';
}
/* ── get natural image dimensions from data URL ── */
function imgNaturalSize(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve({w:img.naturalWidth,h:img.naturalHeight});
    img.onerror=()=>resolve({w:4,h:3});
    img.src=dataUrl;
  });
}
/* ── fit image inside maxW×maxH preserving aspect ratio; return {x,y,w,h} ── */
function fitImg(natW,natH,maxW,maxH,originX,originY){
  const aspect=natW/natH;
  let w=maxW,h=w/aspect;
  if(h>maxH){h=maxH;w=h*aspect;}
  const x=originX+(maxW-w)/2;
  return{x,y:originY,w,h};
}
/* ── strip emoji from string (PDF fonts don't support emoji) ── */
function stripEmoji(s){
  return(s||'').replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{FE00}-\u{FEFF}]/gu,'').trim();
}

/* ── single recipe layout (draws on current page) ── */
async function pdDrawRecipe(doc,recipe){
  const pw=210,ph=297,m=15;let y=m;
  doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
  // photo or botanical top
  if(recipe.photo){
    try{
      const nat=await imgNaturalSize(recipe.photo);
      const fi=fitImg(nat.w,nat.h,pw-m*2,80,m,y);
      doc.addImage(recipe.photo,imgFmt(recipe.photo),fi.x,fi.y,fi.w,fi.h,'','MEDIUM');
      y+=fi.h+4;
    }catch(e){pdBorderStrip(doc,y+6,pw);y+=13;}
  }else{pdBorderStrip(doc,y+6,pw);y+=13;}
  // name (emoji stripped — PDF fonts don't support them)
  doc.setFont('helvetica','bold');doc.setFontSize(21);doc.setTextColor(...PC.teal);
  const nm=doc.splitTextToSize(stripEmoji(recipe.name),pw-m*2);
  doc.text(nm,m,y);y+=nm.length*9.5+3;
  // badges
  doc.setFontSize(8.5);let bx=m;
  const badges=[
    recipe.category&&{l:recipe.category,c:PC.accent},
    recipe.time&&{l:'Tempo: '+recipe.time,c:PC.teal},
    recipe.servings&&{l:recipe.servings+' porções',c:PC.green},
    recipe.calories&&{l:recipe.calories+' kcal/porção',c:[180,90,15]},
    recipe.difficulty&&{l:recipe.difficulty,c:{fácil:PC.green,médio:PC.amber,difícil:PC.red}[recipe.difficulty]||PC.muted},
  ].filter(Boolean);
  for(const b of badges){
    const tw=doc.getTextWidth(b.l)+5;
    if(bx+tw>pw-m){bx=m;y+=7;}
    doc.setFillColor(...b.c);
    doc.roundedRect(bx,y-3.5,tw,5.5,1,1,'F');
    doc.setTextColor(...PC.white);doc.text(b.l,bx+2.5,y+.5);
    bx+=tw+3;
  }
  y+=9;
  doc.setDrawColor(...PC.border);doc.setLineWidth(.3);doc.line(m,y,pw-m,y);y+=6;
  // sections
  if(recipe.ingredients){
    y=needY(doc,y,15,recipe.name);
    y=pdHeading(doc,'INGREDIENTES',y,m);
    y=pdBody(doc,recipe.ingredients,y,pw,m);y+=4;
  }
  if(recipe.preparation){
    y=needY(doc,y,15,recipe.name);
    y=pdHeading(doc,'PREPARAÇÃO',y,m);
    y=pdBody(doc,recipe.preparation,y,pw,m);y+=4;
  }
  // notes blocks
  const notes=recipe.notes;
  if(notes){
    const blocks=Array.isArray(notes)?notes:(typeof notes==='string'&&notes.trim()?[{type:'text',content:notes}]:[]);
    if(blocks.length){
      y=needY(doc,y,15,recipe.name);
      y=pdHeading(doc,'NOTAS',y,m);
      for(const b of blocks){
        if(b.type==='text'&&b.content){
          y=needY(doc,y,10,recipe.name);y=pdBody(doc,b.content,y,pw,m);
        }else if(b.type==='url'&&b.url){
          y=needY(doc,y,8,recipe.name);
          doc.setFontSize(9);doc.setTextColor(...PC.teal);doc.setFont('helvetica','normal');
          const ul='Link: '+(b.label||b.url);
          doc.text(ul,m,y);doc.link(m,y-4,doc.getTextWidth(ul),5,{url:b.url});y+=7;
        }else if(b.type==='image'&&b.data){
          try{
            const nat=await imgNaturalSize(b.data);
            const fi=fitImg(nat.w,nat.h,pw-m*2-20,60,m+10,0);
            y=needY(doc,y,fi.h+4,recipe.name);
            doc.addImage(b.data,imgFmt(b.data),fi.x,y,fi.w,fi.h,'','MEDIUM');
            y+=fi.h+4;
          }catch(e){}
        }
      }
    }
  }
  // footer
  pdBorderStrip(doc,ph-10,pw);
  doc.setFontSize(7.5);doc.setTextColor(...PC.muted);doc.setFont('helvetica','italic');
  doc.text('As Minhas Receitas · de Susana',pw/2,ph-4,{align:'center'});
}

/* ── export meal PDF ── */
async function pdDrawMeal(doc,entry){
  const pw=210,ph=297,m=15;let y=m;
  doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
  // photo
  if(entry.photo){
    try{
      const nat=await imgNaturalSize(entry.photo);
      const fi=fitImg(nat.w,nat.h,pw-m*2,80,m,y);
      doc.addImage(entry.photo,imgFmt(entry.photo),fi.x,fi.y,fi.w,fi.h,'','MEDIUM');
      y+=fi.h+4;
    }catch{pdBorderStrip(doc,y+6,pw);y+=13;}
  }else{pdBorderStrip(doc,y+6,pw);y+=13;}
  // slot label
  const s=SLOTS.find(x=>x.key===entry._slot);
  if(s){
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...PC.muted);
    doc.text(stripEmoji(s.label).toUpperCase(),m,y);y+=6;
  }
  // name
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(...PC.teal);
  const nm=doc.splitTextToSize(stripEmoji(entry.name),pw-m*2);
  doc.text(nm,m,y);y+=nm.length*9+4;
  doc.setDrawColor(...PC.border);doc.setLineWidth(.3);doc.line(m,y,pw-m,y);y+=6;
  // free ingredients first
  if(entry.ingredients){
    y=needY(doc,y,15,entry.name);
    y=pdHeading(doc,'INGREDIENTES',y,m);
    y=pdBody(doc,entry.ingredients,y,pw,m);y+=4;
  }
  // linked recipes
  const _rIds=_entryRecipeIds(entry);
  for(const rid of _rIds){
    const r=recipes.find(x=>x.id===rid);
    if(!r)continue;
    y=needY(doc,y,15,entry.name);
    y=pdHeading(doc,`RECEITA: ${stripEmoji(r.name).toUpperCase()}`,y,m);
    if(r.ingredients)y=pdBody(doc,r.ingredients,y,pw,m);
    y+=4;
  }
  // footer
  pdBorderStrip(doc,ph-10,pw);
  doc.setFontSize(7.5);doc.setTextColor(...PC.muted);doc.setFont('helvetica','italic');
  doc.text('As Minhas Receitas · de Susana',pw/2,ph-4,{align:'center'});
}

async function exportMealPDF(slot,entryId,btn){
  const entry=(refeicoes[slot]||[]).find(x=>x.id===entryId);
  if(!entry)return;
  const orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    await pdDrawMeal(doc,{...entry,_slot:slot});
    doc.save(`${stripEmoji(entry.name)||'refeicao'}.pdf`);
  }finally{if(btn){btn.textContent=orig;btn.disabled=false;}}
}

/* ── export single recipe ── */
async function exportRecipePDF(recipe,btn){
  if(!recipe)return;
  const orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    await pdDrawRecipe(doc,recipe);
    doc.save((recipe.name||'receita').replace(/[^\w\s-]/gi,'_').trim()+'.pdf');
  }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  finally{if(btn){btn.textContent=orig;btn.disabled=false;}}
}

/* ── export all recipes by category ── */
async function exportAllPDF(btn){
  if(!recipes.length){alert('Não há receitas para exportar.');return;}
  const orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ A gerar…';btn.disabled=true;}
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,m=15;

    /* ── capa ── */
    pdDrawCover(doc,pw,ph,m,recipes.length);

    /* ── categorias ── */
    const grouped={};
    recipes.forEach(r=>{const c=r.category||'Outro';if(!grouped[c])grouped[c]=[];grouped[c].push(r);});
    for(const cat of Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'pt'))){
      /* página separadora de categoria */
      doc.addPage();
      pdDrawCategory(doc,cat,grouped[cat].length,pw,ph);

      /* receitas da categoria */
      for(const recipe of grouped[cat]){
        doc.addPage();
        await pdDrawRecipe(doc,recipe);
      }
    }

    /* números de página (a partir da pág 2) */
    const total=doc.internal.getNumberOfPages();
    for(let i=2;i<=total;i++){
      doc.setPage(i);
      doc.setFontSize(8);doc.setTextColor(...PC.muted);
      doc.setFont('helvetica','normal');
      doc.text(String(i),pw-m,ph-4,{align:'right'});
    }
    doc.save('As_Minhas_Receitas.pdf');
  }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  finally{if(btn){btn.textContent=orig;btn.disabled=false;}}
}
