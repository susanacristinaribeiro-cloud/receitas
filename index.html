<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍽️ Receitas</title>
<style>
  :root {
    --bg:#fafaf8;--card:#fff;--border:#e8e4de;--text:#2d2926;--muted:#8a857e;
    --accent:#c97d4e;--accent-light:#f5ede4;--green:#4caf6e;--red:#e05252;
    --orange:#f0a030;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;}

  header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100;}
  header h1{font-size:18px;font-weight:700;flex:1;}
  .status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);transition:background .3s;}
  .status-dot.red{background:var(--red);}.status-dot.orange{background:var(--orange);}
  .btn-icon{background:none;border:none;cursor:pointer;font-size:20px;padding:6px;border-radius:8px;}
  .btn-icon:hover{background:var(--accent-light);}

  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;}
  .tab{padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;color:var(--muted);white-space:nowrap;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  .page{display:none;padding:20px;max-width:960px;margin:0 auto;}
  .page.active{display:block;}

  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .search-box{flex:1;min-width:180px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);}
  .search-box:focus{outline:2px solid var(--accent);border-color:transparent;}
  select.filter{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);cursor:pointer;}
  .btn{padding:9px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--border);color:var(--text);}

  /* Category groups */
  .cat-section{margin-bottom:28px;}
  .cat-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:6px 2px 10px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .cat-section-title .cat-count{font-size:11px;background:var(--accent-light);color:var(--accent);border-radius:10px;padding:1px 7px;}

  /* Recipe cards */
  .recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .1s;}
  .recipe-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
  .recipe-card .card-photo{width:100%;height:130px;object-fit:cover;display:block;}
  .recipe-card .card-photo-placeholder{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--accent-light);}
  .recipe-card .card-body{padding:10px 12px;}
  .recipe-card h3{font-size:13px;font-weight:600;margin-bottom:4px;}
  .recipe-card .meta{font-size:11px;color:var(--muted);display:flex;gap:5px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-light);color:var(--accent);}

  /* Detail */
  .recipe-detail{display:none;}
  .recipe-detail.active{display:block;}
  .detail-photo{width:100%;max-height:300px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px;}
  .detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
  .detail-emoji{font-size:52px;}
  .detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .detail-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .detail-section h4{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .detail-section p{white-space:pre-wrap;line-height:1.6;font-size:14px;}

  /* Photo upload */
  .photo-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .15s;display:block;}
  .photo-upload-area:hover{border-color:var(--accent);background:var(--accent-light);}
  .photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;}
  .photo-remove{font-size:12px;color:var(--red);cursor:pointer;margin-top:6px;display:none;}

  /* Notes block editor */
  .notes-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg);}
  .notes-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .notes-block-hdr span{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .notes-block-hdr button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--red);padding:2px 6px;border-radius:6px;}
  .notes-block-hdr button:hover{background:#fdeaea;}
  .notes-block textarea,.notes-block input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);resize:vertical;}
  .notes-block textarea:focus,.notes-block input:focus{outline:2px solid var(--accent);border-color:transparent;}
  .notes-block .nb-url-label{font-size:11px;color:var(--muted);margin:6px 0 3px;}
  .notes-add-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .notes-add-bar button{font-size:12px;padding:6px 12px;}

  /* Notes blocks in detail view */
  .notes-text-block{white-space:pre-wrap;line-height:1.6;font-size:14px;margin-bottom:10px;}
  .notes-img-block{max-width:100%;border-radius:8px;margin-bottom:10px;display:block;cursor:pointer;}
  .notes-url-block{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--accent);text-decoration:none;margin-bottom:8px;background:var(--accent-light);max-width:100%;word-break:break-all;}
  .notes-url-block:hover{opacity:.8;}

  /* Refeições */
  .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .slot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .slot-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
  .slot-header .slot-icon{font-size:22px;}
  .slot-header h3{font-size:15px;font-weight:700;flex:1;}
  .slot-header .slot-count{font-size:12px;color:var(--muted);}
  .slot-entries{padding:10px 12px;}
  .refeicao-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border);}
  .refeicao-item .ri-name{font-size:14px;font-weight:600;flex:1;}
  .refeicao-item .ri-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .ri-actions{display:flex;gap:4px;flex-shrink:0;}
  .ri-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:6px;color:var(--muted);}
  .ri-btn:hover{background:var(--border);color:var(--text);}
  .ri-btn.del:hover{background:#fdeaea;color:var(--red);}
  .slot-add-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--muted);margin-top:4px;}
  .slot-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .sc-peq{border-top:3px solid #f59e0b;}.sc-lm{border-top:3px solid #6ec96e;}
  .sc-alm{border-top:3px solid #5ba4cf;}.sc-lt{border-top:3px solid #e0913a;}
  .sc-jan{border-top:3px solid #9b7fd4;}.sc-sei{border-top:3px solid #e07a8a;}

  /* Modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .overlay.open{display:flex;}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:24px;}
  .modal h2{font-size:18px;margin-bottom:20px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);font-family:inherit;resize:vertical;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--accent);border-color:transparent;}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .radio-group{display:flex;gap:10px;flex-wrap:wrap;}
  .radio-group label{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;}
  .radio-group label:has(input:checked){border-color:var(--accent);background:var(--accent-light);}
  .settings-row{display:flex;gap:8px;align-items:center;}.settings-row input{flex:1;}
  .test-result{font-size:12px;margin-top:6px;}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty .big{font-size:40px;margin-bottom:10px;}
  .cat-input-wrap{display:flex;gap:6px;}
  .cat-input-wrap input{flex:1;}

  /* Lightbox */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
  #lightbox.open{display:flex;}
  #lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain;}
</style>
</head>
<body>

<header>
  <span id="statusDot" class="status-dot red"></span>
  <h1>🍽️ Receitas</h1>
  <button class="btn-icon" onclick="openSettings()">⚙️</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('receitas')">📖 Receitas</div>
  <div class="tab" onclick="showTab('refeicoes')">🥗 Refeições</div>
</div>

<!-- ═══ RECEITAS ═══ -->
<div id="page-receitas" class="page active">
  <div id="view-list">
    <div class="toolbar">
      <input id="searchInput" class="search-box" placeholder="🔍 Pesquisar receitas..." oninput="renderRecipes()"/>
      <select id="filterCat" class="filter" onchange="renderRecipes()">
        <option value="">Todas as categorias</option>
      </select>
      <button class="btn btn-primary" onclick="openRecipeModal()">+ Nova Receita</button>
    </div>
    <div id="recipesContainer"></div>
  </div>

  <div id="view-detail" class="recipe-detail">
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="showList()">← Voltar</button>
      <button class="btn btn-primary" onclick="editCurrent()">✏️ Editar</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑 Apagar</button>
    </div>
    <img id="detailPhoto" class="detail-photo" style="display:none" src="" alt="foto" onclick="openLightbox(this.src)"/>
    <div class="detail-header">
      <div id="detailEmoji" class="detail-emoji">🍽️</div>
      <div><h2 id="detailName"></h2><div class="detail-meta" id="detailMeta"></div></div>
    </div>
    <div class="detail-section"><h4>🧂 Ingredientes</h4><p id="detailIngredients"></p></div>
    <div class="detail-section"><h4>👨‍🍳 Preparação</h4><p id="detailPreparation"></p></div>
    <div id="detailNotesSection" class="detail-section" style="display:none">
      <h4>📝 Notas</h4><div id="detailNotes"></div>
    </div>
  </div>
</div>

<!-- ═══ REFEIÇÕES ═══ -->
<div id="page-refeicoes" class="page">
  <div class="toolbar">
    <span style="font-size:14px;color:var(--muted)">Organiza as tuas refeições por tipo</span>
  </div>
  <div id="slotGrid" class="slot-grid"></div>
</div>

<!-- ═══ MODAL: RECEITA ═══ -->
<div id="recipeOverlay" class="overlay" onclick="closeIfBackdrop(event,'recipeOverlay')">
  <div class="modal">
    <h2 id="modalTitle">Nova Receita</h2>
    <input type="hidden" id="editId"/>

    <div class="form-row">
      <div class="form-group">
        <label>Emoji</label>
        <input id="fEmoji" value="🍽️" maxlength="4"/>
      </div>
      <div class="form-group">
        <label>Nome *</label>
        <input id="fName" placeholder="ex: Arroz de Pato"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <div class="cat-input-wrap">
          <input id="fCat" list="catDatalist" placeholder="Escolhe ou escreve nova..."/>
          <datalist id="catDatalist"></datalist>
        </div>
      </div>
      <div class="form-group">
        <label>Dificuldade</label>
        <select id="fDiff"><option>fácil</option><option selected>médio</option><option>difícil</option></select>
      </div>
    </div>

    <div class="form-row-3">
      <div class="form-group"><label>Tempo</label><input id="fTime" placeholder="30 min"/></div>
      <div class="form-group"><label>Porções</label><input id="fServings" type="number" value="4" min="1"/></div>
      <div class="form-group"><label>🔥 Calorias (kcal)</label><input id="fCalories" type="number" min="0" placeholder="ex: 450"/></div>
    </div>

    <div class="form-group">
      <label>📷 Foto Principal</label>
      <label class="photo-upload-area" for="fPhotoInput">
        <span id="photoUploadLabel">Clica ou arrasta uma foto aqui</span>
        <img id="photoPreview" class="photo-preview" src="" alt="preview"/>
        <div id="photoRemove" class="photo-remove" onclick="removePhoto(event)">✕ Remover foto</div>
      </label>
      <input type="file" id="fPhotoInput" accept="image/*" style="display:none" onchange="onPhotoSelected(event)"/>
      <input type="hidden" id="fPhoto"/>
    </div>

    <div class="form-group"><label>Ingredientes</label><textarea id="fIngredients" rows="4" placeholder="500g frango&#10;2 dentes alho&#10;..."></textarea></div>
    <div class="form-group"><label>Preparação</label><textarea id="fPrep" rows="5" placeholder="1. Temperar...&#10;2. ..."></textarea></div>

    <div class="form-group">
      <label>Notas</label>
      <div id="notesBlockList"></div>
      <div class="notes-add-bar">
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('text')">+ Texto</button>
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('image')">+ Foto</button>
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('url')">+ URL</button>
      </div>
      <input type="file" id="notesPhotoInput" accept="image/*" style="display:none" onchange="onNotesPhotoSelected(event)"/>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('recipeOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: REFEIÇÃO ═══ -->
<div id="refeicaoOverlay" class="overlay" onclick="closeIfBackdrop(event,'refeicaoOverlay')">
  <div class="modal">
    <h2 id="refeicaoModalTitle">Adicionar refeição</h2>
    <input type="hidden" id="rfSlot"/>
    <input type="hidden" id="rfId"/>
    <div class="form-group">
      <label>Tipo de entrada</label>
      <div class="radio-group">
        <label><input type="radio" name="rfType" value="recipe" onchange="toggleRfType()"/> <span>🔗 Receita existente</span></label>
        <label><input type="radio" name="rfType" value="free" checked onchange="toggleRfType()"/> <span>✏️ Nome livre</span></label>
        <label><input type="radio" name="rfType" value="ingr" onchange="toggleRfType()"/> <span>🧂 Nome + ingredientes</span></label>
      </div>
    </div>
    <div id="rfRecipeRow" class="form-group" style="display:none">
      <label>Escolher receita</label>
      <select id="rfRecipeSel" onchange="onRecipeSelected()"><option value="">— Selecciona —</option></select>
    </div>
    <div id="rfNameRow" class="form-group">
      <label>Nome</label>
      <input id="rfName" placeholder="ex: Iogurte com granola"/>
    </div>
    <div id="rfIngrRow" class="form-group" style="display:none">
      <label>Ingredientes</label>
      <textarea id="rfIngr" rows="4" placeholder="1 iogurte natural&#10;2 colheres granola"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('refeicaoOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRefeicao()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: SETTINGS ═══ -->
<div id="settingsOverlay" class="overlay" onclick="closeIfBackdrop(event,'settingsOverlay')">
  <div class="modal" style="max-width:420px">
    <h2>⚙️ Configuração API</h2>
    <div class="form-group">
      <label>URL do Backend</label>
      <div class="settings-row">
        <input id="sUrl" placeholder="https://receitas-api-xxx.run.app"/>
        <button class="btn btn-ghost" onclick="testConnection()">Testar</button>
      </div>
      <div id="testResult" class="test-result"></div>
    </div>
    <div class="form-group"><label>API Key</label><input id="sKey" type="password"/></div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px">Sem URL, a app funciona offline com dados locais.</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('settingsOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSettings()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ LIGHTBOX ═══ -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let recipes=[], refeicoes={}, categories=[], currentRecipe=null;
let notesBlocks=[], notesPhotoTargetIdx=-1;

const SLOTS=[
  {key:'peq-almoço',  label:'Pequeno-almoço',icon:'☀️', cls:'sc-peq'},
  {key:'lanche-manhã',label:'Lanche Manhã',  icon:'🍎', cls:'sc-lm'},
  {key:'almoço',      label:'Almoço',         icon:'🌿', cls:'sc-alm'},
  {key:'lanche-tarde',label:'Lanche Tarde',   icon:'🍊', cls:'sc-lt'},
  {key:'jantar',      label:'Jantar',          icon:'🌙', cls:'sc-jan'},
  {key:'seia',        label:'Seia',            icon:'🌛', cls:'sc-sei'},
];

const DEFAULT_CATS=['Sopas','Carnes','Peixe','Vegetariano','Massas','Saladas','Sobremesas','Snacks','Pequeno-almoço','Bebidas','Outro'];

// ─── Config ───────────────────────────────────────────────────────────────────
const getApiUrl=()=>localStorage.getItem('api_url')||'';
const getApiKey=()=>localStorage.getItem('api_key')||'';
const hdrs=(x={})=>{const h={'Content-Type':'application/json',...x};if(getApiKey())h['X-API-Key']=getApiKey();return h;};
function setStatus(s){const d=document.getElementById('statusDot');d.className='status-dot'+(s!=='green'?' '+s:'');}

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiFetch(path,opts={},timeoutMs=30000){
  const base=getApiUrl();if(!base)throw new Error('Sem URL');
  setStatus('orange');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const res=await fetch(base.replace(/\/$/,'')+path,{...opts,headers:hdrs(opts.headers||{}),signal:ctrl.signal});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    setStatus('green');
    return res.status===204?null:res.json();
  }finally{clearTimeout(tid);}
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  if(!getApiUrl()){loadLocal();setStatus('red');render();return;}
  try{
    [recipes,refeicoes,categories]=await Promise.all([
      apiFetch('/recipes'),apiFetch('/refeicoes'),apiFetch('/categories')
    ]);
    saveLocal();setStatus('green');
  }catch{loadLocal();setStatus('red');}
  render();
}

function loadLocal(){
  try{recipes=JSON.parse(localStorage.getItem('recipes')||'[]');}catch{recipes=[];}
  try{refeicoes=JSON.parse(localStorage.getItem('refeicoes')||'{}');}catch{refeicoes={};}
  try{categories=JSON.parse(localStorage.getItem('categories')||'null')||[...DEFAULT_CATS];}catch{categories=[...DEFAULT_CATS];}
}

function saveLocal(){
  localStorage.setItem('recipes',JSON.stringify(recipes));
  localStorage.setItem('refeicoes',JSON.stringify(refeicoes));
  localStorage.setItem('categories',JSON.stringify(categories));
}

function render(){renderRecipes();renderSlots();populateCatFilter();populateCatDatalist();}

function populateCatFilter(){
  const sel=document.getElementById('filterCat');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as categorias</option>'+
    [...new Set([...categories,...recipes.map(r=>r.category).filter(Boolean)])].sort()
    .map(c=>`<option${cur===c?' selected':''}>${esc(c)}</option>`).join('');
}

function populateCatDatalist(){
  document.getElementById('catDatalist').innerHTML=
    [...new Set([...categories,...recipes.map(r=>r.category).filter(Boolean)])].sort()
    .map(c=>`<option value="${esc(c)}">`).join('');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='receitas'?0:1)));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
}

// ─── Receitas ─────────────────────────────────────────────────────────────────
function recipeCardHtml(r){
  return `<div class="recipe-card" onclick="showDetail('${r.id}')">
    ${r.photo
      ?`<img class="card-photo" src="${r.photo}" alt="${esc(r.name)}" loading="lazy"/>`
      :`<div class="card-photo-placeholder">${r.emoji||'🍽️'}</div>`}
    <div class="card-body">
      <h3>${esc(r.name)}</h3>
      <div class="meta">
        <span>${diffIcon(r.difficulty)}</span>
        ${r.time?`<span>⏱ ${esc(r.time)}</span>`:''}
        ${r.servings?`<span>👥 ${r.servings}</span>`:''}
        ${r.calories?`<span>🔥 ${r.calories} kcal</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderRecipes(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const catFilter=document.getElementById('filterCat').value;
  let list=recipes.filter(r=>
    (!q||r.name.toLowerCase().includes(q)||(r.ingredients||'').toLowerCase().includes(q))&&
    (!catFilter||r.category===catFilter)
  );
  const container=document.getElementById('recipesContainer');
  if(!list.length){
    container.innerHTML='<div class="empty"><div class="big">🍽️</div><p>Sem receitas. Adiciona a primeira!</p></div>';
    return;
  }
  // agrupar por categoria
  const grouped={};
  list.forEach(r=>{
    const cat=r.category||'Outro';
    if(!grouped[cat])grouped[cat]=[];
    grouped[cat].push(r);
  });
  const sortedCats=Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'pt'));
  container.innerHTML=sortedCats.map(cat=>`
    <div class="cat-section">
      <div class="cat-section-title">
        ${esc(cat)}
        <span class="cat-count">${grouped[cat].length}</span>
      </div>
      <div class="recipes-grid">${grouped[cat].map(recipeCardHtml).join('')}</div>
    </div>`).join('');
}

function diffIcon(d){return{fácil:'🟢',médio:'🟡',difícil:'🔴'}[d]||'';}
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── Detail ───────────────────────────────────────────────────────────────────
function showDetail(id){
  currentRecipe=recipes.find(r=>r.id===id);if(!currentRecipe)return;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').classList.add('active');
  const dp=document.getElementById('detailPhoto');
  if(currentRecipe.photo){dp.src=currentRecipe.photo;dp.style.display='block';}
  else dp.style.display='none';
  document.getElementById('detailEmoji').textContent=currentRecipe.emoji||'🍽️';
  document.getElementById('detailEmoji').style.display=currentRecipe.photo?'none':'block';
  document.getElementById('detailName').textContent=currentRecipe.name;
  document.getElementById('detailMeta').innerHTML=`
    <span class="badge">${esc(currentRecipe.category||'Outro')}</span>
    ${currentRecipe.time?`<span class="badge" style="background:#edf7ed;color:#4caf6e">⏱ ${esc(currentRecipe.time)}</span>`:''}
    ${currentRecipe.servings?`<span class="badge" style="background:#e8f0fe;color:#3b6fe0">👥 ${currentRecipe.servings} porções</span>`:''}
    ${currentRecipe.calories?`<span class="badge" style="background:#fff3e0;color:#e65100">🔥 ${currentRecipe.calories} kcal</span>`:''}
    <span class="badge" style="background:#fafafa">${diffIcon(currentRecipe.difficulty)} ${esc(currentRecipe.difficulty||'')}</span>`;
  document.getElementById('detailIngredients').textContent=currentRecipe.ingredients||'—';
  document.getElementById('detailPreparation').textContent=currentRecipe.preparation||'—';
  const ns=document.getElementById('detailNotesSection');
  const notesHtml=renderNotesBlocksHtml(currentRecipe.notes);
  if(notesHtml){ns.style.display='block';document.getElementById('detailNotes').innerHTML=notesHtml;}
  else ns.style.display='none';
}

function renderNotesBlocksHtml(notes){
  if(!notes)return'';
  let blocks;
  if(Array.isArray(notes))blocks=notes;
  else if(typeof notes==='string'&&notes.trim())blocks=[{type:'text',content:notes}];
  else return'';
  if(!blocks.length)return'';
  return blocks.map(b=>{
    if(b.type==='text')return`<p class="notes-text-block">${esc(b.content||'')}</p>`;
    if(b.type==='image'&&b.data)return`<img src="${b.data}" class="notes-img-block" onclick="openLightbox(this.src)" alt="nota"/>`;
    if(b.type==='url'&&b.url)return`<a href="${esc(b.url)}" target="_blank" rel="noopener" class="notes-url-block">🔗 ${esc(b.label||b.url)}</a><br/>`;
    return'';
  }).join('');
}

function showList(){document.getElementById('view-list').style.display='';document.getElementById('view-detail').classList.remove('active');currentRecipe=null;}
function editCurrent(){if(currentRecipe)openRecipeModal(currentRecipe);}

// ─── Photo upload (foto principal) ───────────────────────────────────────────
function onPhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.75);
      document.getElementById('fPhoto').value=compressed;
      document.getElementById('photoPreview').src=compressed;
      document.getElementById('photoPreview').style.display='block';
      document.getElementById('photoRemove').style.display='block';
      document.getElementById('photoUploadLabel').textContent='Foto seleccionada ✓';
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(e){
  e.preventDefault();e.stopPropagation();
  document.getElementById('fPhoto').value='';
  document.getElementById('fPhotoInput').value='';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoRemove').style.display='none';
  document.getElementById('photoUploadLabel').textContent='Clica ou arrasta uma foto aqui';
}

// ─── Notes block editor ───────────────────────────────────────────────────────
function renderNotesEditor(){
  const list=document.getElementById('notesBlockList');
  list.innerHTML=notesBlocks.map((b,i)=>{
    if(b.type==='text')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📝 Texto</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        <textarea rows="3" oninput="notesBlocks[${i}].content=this.value">${escRaw(b.content||'')}</textarea>
      </div>`;
    if(b.type==='image')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📷 Foto</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        ${b.data
          ?`<img src="${b.data}" style="max-width:100%;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="pickNotesPhoto(${i})" title="Clica para trocar"/>
            <div style="font-size:11px;color:var(--muted)">Clica na foto para trocar</div>`
          :`<label class="photo-upload-area" style="padding:14px" onclick="pickNotesPhoto(${i});return false;">Clica para adicionar foto</label>`}
      </div>`;
    if(b.type==='url')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>🔗 URL</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        <input type="url" placeholder="https://..." value="${esc(b.url||'')}" oninput="notesBlocks[${i}].url=this.value" style="margin-bottom:6px"/>
        <div class="nb-url-label">Texto do link (opcional)</div>
        <input type="text" placeholder="ex: Receita original" value="${esc(b.label||'')}" oninput="notesBlocks[${i}].label=this.value"/>
      </div>`;
    return'';
  }).join('');
}

function escRaw(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addNotesBlock(type){
  if(type==='text')notesBlocks.push({type:'text',content:''});
  else if(type==='image')notesBlocks.push({type:'image',data:null});
  else if(type==='url')notesBlocks.push({type:'url',url:'',label:''});
  renderNotesEditor();
}

function removeNotesBlock(i){
  notesBlocks.splice(i,1);
  renderNotesEditor();
}

function pickNotesPhoto(i){
  notesPhotoTargetIdx=i;
  document.getElementById('notesPhotoInput').value='';
  document.getElementById('notesPhotoInput').click();
}

function onNotesPhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      notesBlocks[notesPhotoTargetIdx].data=canvas.toDataURL('image/jpeg',0.75);
      renderNotesEditor();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function loadNotesIntoEditor(notes){
  if(!notes)notesBlocks=[];
  else if(Array.isArray(notes))notesBlocks=JSON.parse(JSON.stringify(notes));
  else if(typeof notes==='string'&&notes.trim())notesBlocks=[{type:'text',content:notes}];
  else notesBlocks=[];
  renderNotesEditor();
}

// ─── Recipe modal ─────────────────────────────────────────────────────────────
function openRecipeModal(r=null){
  document.getElementById('modalTitle').textContent=r?'Editar Receita':'Nova Receita';
  document.getElementById('editId').value=r?r.id:'';
  document.getElementById('fEmoji').value=r?r.emoji:'🍽️';
  document.getElementById('fName').value=r?r.name:'';
  document.getElementById('fCat').value=r?(r.category||''):'';
  document.getElementById('fDiff').value=r?(r.difficulty||'médio'):'médio';
  document.getElementById('fTime').value=r?(r.time||''):'';
  document.getElementById('fServings').value=r?(r.servings||4):4;
  document.getElementById('fCalories').value=r?(r.calories||''):'';
  document.getElementById('fIngredients').value=r?(r.ingredients||''):'';
  document.getElementById('fPrep').value=r?(r.preparation||''):'';
  // foto principal
  document.getElementById('fPhoto').value=r?(r.photo||''):'';
  document.getElementById('fPhotoInput').value='';
  if(r&&r.photo){
    document.getElementById('photoPreview').src=r.photo;
    document.getElementById('photoPreview').style.display='block';
    document.getElementById('photoRemove').style.display='block';
    document.getElementById('photoUploadLabel').textContent='Foto seleccionada ✓';
  }else{
    document.getElementById('photoPreview').style.display='none';
    document.getElementById('photoRemove').style.display='none';
    document.getElementById('photoUploadLabel').textContent='Clica ou arrasta uma foto aqui';
  }
  // notas em blocos
  loadNotesIntoEditor(r?r.notes:null);
  populateCatDatalist();
  openModal('recipeOverlay');
}

async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('O nome é obrigatório.');return;}
  const cat=document.getElementById('fCat').value.trim()||'Outro';
  const photo=document.getElementById('fPhoto').value||null;
  const calVal=document.getElementById('fCalories').value;
  const calories=calVal?parseInt(calVal):null;
  // Recolhe estado actual das textareas das notas (oninput pode não ter disparado em todos)
  document.querySelectorAll('#notesBlockList .notes-block').forEach((el,i)=>{
    const ta=el.querySelector('textarea');if(ta&&notesBlocks[i])notesBlocks[i].content=ta.value;
  });
  const notes=notesBlocks.length>0?notesBlocks:null;
  const body={
    name,emoji:document.getElementById('fEmoji').value.trim()||'🍽️',
    category:cat,difficulty:document.getElementById('fDiff').value,
    time:document.getElementById('fTime').value.trim(),
    servings:parseInt(document.getElementById('fServings').value)||4,
    calories,ingredients:document.getElementById('fIngredients').value.trim(),
    preparation:document.getElementById('fPrep').value.trim(),
    notes,photo
  };
  const id=document.getElementById('editId').value;
  if(cat&&!categories.includes(cat))categories.push(cat);
  try{
    if(id){const u=await apiFetch(`/recipes/${id}`,{method:'PUT',body:JSON.stringify(body)});const i=recipes.findIndex(r=>r.id===id);if(i>=0)recipes[i]=u;currentRecipe=u;}
    else{const c=await apiFetch('/recipes',{method:'POST',body:JSON.stringify(body)});recipes.push(c);}
    try{categories=await apiFetch('/categories');}catch{}
  }catch{
    if(id){const i=recipes.findIndex(r=>r.id===id);if(i>=0){recipes[i]={...recipes[i],...body};currentRecipe=recipes[i];}}
    else{const r={...body,id:crypto.randomUUID(),created_at:new Date().toISOString()};recipes.push(r);}
  }
  saveLocal();closeModal('recipeOverlay');
  if(id)showDetail(id);else showList();
  render();
}

async function deleteCurrent(){
  if(!currentRecipe)return;
  if(!confirm(`Apagar "${currentRecipe.name}"?`))return;
  try{await apiFetch(`/recipes/${currentRecipe.id}`,{method:'DELETE'});}catch{}
  recipes=recipes.filter(r=>r.id!==currentRecipe.id);
  saveLocal();showList();render();
}

// ─── Refeições ─────────────────────────────────────────────────────────────────
function renderSlots(){
  const grid=document.getElementById('slotGrid');
  grid.innerHTML=SLOTS.map(s=>{
    const entries=refeicoes[s.key]||[];
    return`<div class="slot-card ${s.cls}">
      <div class="slot-header">
        <span class="slot-icon">${s.icon}</span>
        <h3>${s.label}</h3>
        <span class="slot-count">${entries.length}</span>
      </div>
      <div class="slot-entries">
        ${entries.map(e=>`
          <div class="refeicao-item">
            <div style="flex:1">
              <div class="ri-name">${esc(e.name)}</div>
              ${e.recipe_id?`<div class="ri-sub">🔗 receita</div>`:''}
              ${e.ingredients&&!e.recipe_id?`<div class="ri-sub">${esc(e.ingredients.split('\n').slice(0,2).join(', '))}${e.ingredients.split('\n').length>2?'...':''}</div>`:''}
            </div>
            <div class="ri-actions">
              <button class="ri-btn" onclick="openEditRefeicao('${s.key}','${e.id}')">✏️</button>
              <button class="ri-btn del" onclick="deleteRefeicao('${s.key}','${e.id}')">✕</button>
            </div>
          </div>`).join('')}
        <button class="slot-add-btn" onclick="openAddRefeicao('${s.key}')">+ Adicionar</button>
      </div>
    </div>`;
  }).join('');
}

function openAddRefeicao(slot){
  const s=SLOTS.find(x=>x.key===slot);
  document.getElementById('refeicaoModalTitle').textContent=`${s.icon} ${s.label} — Nova refeição`;
  document.getElementById('rfSlot').value=slot;document.getElementById('rfId').value='';
  document.getElementById('rfName').value='';document.getElementById('rfIngr').value='';
  document.querySelector('input[name=rfType][value=free]').checked=true;toggleRfType();
  const sel=document.getElementById('rfRecipeSel');
  sel.innerHTML='<option value="">— Selecciona —</option>'+recipes.map(r=>`<option value="${r.id}">${r.emoji||'🍽️'} ${esc(r.name)}</option>`).join('');
  openModal('refeicaoOverlay');setTimeout(()=>document.getElementById('rfName').focus(),100);
}

function openEditRefeicao(slot,id){
  const entry=(refeicoes[slot]||[]).find(e=>e.id===id);if(!entry)return;
  const s=SLOTS.find(x=>x.key===slot);
  document.getElementById('refeicaoModalTitle').textContent=`${s.icon} ${s.label} — Editar`;
  document.getElementById('rfSlot').value=slot;document.getElementById('rfId').value=id;
  document.getElementById('rfName').value=entry.name;document.getElementById('rfIngr').value=entry.ingredients||'';
  const sel=document.getElementById('rfRecipeSel');
  sel.innerHTML='<option value="">— Selecciona —</option>'+recipes.map(r=>`<option value="${r.id}">${r.emoji||'🍽️'} ${esc(r.name)}</option>`).join('');
  if(entry.recipe_id){document.querySelector('input[name=rfType][value=recipe]').checked=true;sel.value=entry.recipe_id;}
  else if(entry.ingredients){document.querySelector('input[name=rfType][value=ingr]').checked=true;}
  else{document.querySelector('input[name=rfType][value=free]').checked=true;}
  toggleRfType();openModal('refeicaoOverlay');
}

function toggleRfType(){
  const t=document.querySelector('input[name=rfType]:checked').value;
  document.getElementById('rfRecipeRow').style.display=t==='recipe'?'':'none';
  document.getElementById('rfNameRow').style.display=t==='recipe'?'none':'';
  document.getElementById('rfIngrRow').style.display=t==='ingr'?'':'none';
}

function onRecipeSelected(){
  const id=document.getElementById('rfRecipeSel').value;
  const r=recipes.find(x=>x.id===id);if(r)document.getElementById('rfName').value=r.name;
}

async function saveRefeicao(){
  const slot=document.getElementById('rfSlot').value;
  const editId=document.getElementById('rfId').value;
  const t=document.querySelector('input[name=rfType]:checked').value;
  let name=document.getElementById('rfName').value.trim();
  const recipe_id=t==='recipe'?document.getElementById('rfRecipeSel').value||null:null;
  const ingredients=t==='ingr'?document.getElementById('rfIngr').value.trim()||null:null;
  if(t==='recipe'){const r=recipes.find(x=>x.id===recipe_id);if(r)name=name||r.name;}
  if(!name){alert('O nome é obrigatório.');return;}
  const body={name,recipe_id,ingredients};
  try{
    if(editId){const u=await apiFetch(`/refeicoes/${encodeURIComponent(slot)}/${editId}`,{method:'PUT',body:JSON.stringify(body)});const i=(refeicoes[slot]||[]).findIndex(e=>e.id===editId);if(i>=0)refeicoes[slot][i]=u;}
    else{const c=await apiFetch(`/refeicoes/${encodeURIComponent(slot)}`,{method:'POST',body:JSON.stringify(body)});if(!refeicoes[slot])refeicoes[slot]=[];refeicoes[slot].push(c);}
  }catch{
    if(!refeicoes[slot])refeicoes[slot]=[];
    if(editId){const i=refeicoes[slot].findIndex(e=>e.id===editId);if(i>=0)refeicoes[slot][i]={...refeicoes[slot][i],...body};}
    else refeicoes[slot].push({id:crypto.randomUUID(),...body});
  }
  saveLocal();closeModal('refeicaoOverlay');renderSlots();
}

async function deleteRefeicao(slot,id){
  if(!confirm('Remover esta refeição?'))return;
  try{await apiFetch(`/refeicoes/${encodeURIComponent(slot)}/${id}`,{method:'DELETE'});}catch{}
  if(refeicoes[slot])refeicoes[slot]=refeicoes[slot].filter(e=>e.id!==id);
  saveLocal();renderSlots();
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('sUrl').value=getApiUrl();
  document.getElementById('sKey').value=getApiKey();
  document.getElementById('testResult').textContent='';
  openModal('settingsOverlay');
}
async function testConnection(){
  const url=document.getElementById('sUrl').value.trim();const key=document.getElementById('sKey').value.trim();
  const el=document.getElementById('testResult');
  if(!url){el.textContent='⚠️ Introduz um URL.';el.style.color='var(--orange)';return;}
  el.textContent='⏳ A testar...';el.style.color='var(--muted)';
  try{
    const h={'Content-Type':'application/json'};if(key)h['X-API-Key']=key;
    const res=await fetch(url.replace(/\/$/,'')+'/health',{headers:h});
    if(res.ok){const d=await res.json();el.textContent=`✅ Ligado! Storage: ${d.storage}`;el.style.color='var(--green)';}
    else{el.textContent=`❌ Erro HTTP ${res.status}`;el.style.color='var(--red)';}
  }catch(e){el.textContent=`❌ ${e.message}`;el.style.color='var(--red)';}
}
function saveSettings(){
  localStorage.setItem('api_url',document.getElementById('sUrl').value.trim());
  localStorage.setItem('api_key',document.getElementById('sKey').value.trim());
  closeModal('settingsOverlay');loadAll();
}

// ─── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ─── Modal helpers ─────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeIfBackdrop(e,id){if(e.target.id===id)closeModal(id);}

loadAll();
