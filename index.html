<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>As Minhas Receitas</title>
<style>
:root{
  --bg:#f5efd8;--card:#fefcf0;--border:#dfd4b8;--text:#2c3c2a;--muted:#7a8870;
  --accent:#c05818;--accent-light:#fde8d0;--teal:#2a5868;--green:#4a7840;
  --red:#b01820;--amber:#e88a18;--radius:12px;--shadow:0 2px 16px rgba(42,60,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;}

/* ── Header ─────────────────────────────────────────────────────── */
header{background:var(--card);border-bottom:2.5px solid var(--teal);position:sticky;top:0;z-index:100;}
.header-garland{height:18px;background:var(--card);display:flex;align-items:flex-end;justify-content:center;gap:0;overflow:hidden;border-top:1.5px solid var(--teal);}
.header-garland svg{flex-shrink:0;}
.header-body{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;}
.header-botanical{display:flex;align-items:flex-end;gap:4px;flex-shrink:0;}
.header-titles{flex:1;}
.header-title{font-size:17px;font-weight:700;color:var(--teal);letter-spacing:.2px;font-family:Georgia,serif;}
.header-sub{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px;}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green);transition:background .3s;}
.status-dot.red{background:var(--red);}.status-dot.orange{background:var(--amber);}
.btn-icon{background:none;border:none;cursor:pointer;font-size:20px;padding:5px;border-radius:8px;}
.btn-icon:hover{background:var(--accent-light);}

/* botanical strip between header and tabs */
.bstrip{display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:0 8px;background:var(--card);border-bottom:2px solid var(--teal);overflow:hidden;height:44px;}

/* ── Tabs ───────────────────────────────────────────────────────── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:600;color:var(--muted);white-space:nowrap;font-size:14px;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ── Pages ──────────────────────────────────────────────────────── */
.page{display:none;padding:18px;max-width:960px;margin:0 auto;}
.page.active{display:block;}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);color:var(--text);}
.search-box:focus{outline:2px solid var(--teal);border-color:transparent;}
select.filter{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--card);cursor:pointer;color:var(--text);}
.btn{padding:9px 16px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.84;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:var(--border);color:var(--text);}
.btn-teal{background:var(--teal);color:#fff;}

/* ── Category groups ────────────────────────────────────────────── */
.cat-section{margin-bottom:26px;}
.cat-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--teal);padding:5px 2px 9px;border-bottom:1.5px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cat-count{font-size:11px;background:var(--accent-light);color:var(--accent);border-radius:10px;padding:1px 7px;font-weight:700;}

/* ── Recipe cards ───────────────────────────────────────────────── */
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .1s;}
.recipe-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
.recipe-card .card-photo{width:100%;height:130px;object-fit:cover;display:block;}
.recipe-card .card-placeholder{width:100%;height:88px;display:flex;align-items:center;justify-content:center;font-size:38px;background:var(--accent-light);}
.recipe-card .card-body{padding:10px 12px;}
.recipe-card h3{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--text);}
.recipe-card .meta{font-size:11px;color:var(--muted);display:flex;gap:5px;flex-wrap:wrap;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--accent-light);color:var(--accent);}
.badge.teal{background:#e0eff5;color:var(--teal);}
.badge.green{background:#e8f4e8;color:var(--green);}
.badge.amber{background:#fff3e0;color:#c06010;}

/* ── Detail view ────────────────────────────────────────────────── */
.recipe-detail{display:none;}
.recipe-detail.active{display:block;}
.detail-photo{width:100%;max-height:300px;object-fit:cover;border-radius:var(--radius);margin-bottom:16px;cursor:zoom-in;}
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px;}
.detail-emoji{font-size:50px;}
.detail-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.detail-section h4{font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.detail-section p{white-space:pre-wrap;line-height:1.65;font-size:14px;}

/* ── Photo upload ───────────────────────────────────────────────── */
.photo-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .15s;display:block;color:var(--muted);}
.photo-upload-area:hover{border-color:var(--accent);background:var(--accent-light);}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;}
.photo-remove{font-size:12px;color:var(--red);cursor:pointer;margin-top:6px;display:none;}

/* ── Notes blocks editor ────────────────────────────────────────── */
.notes-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg);}
.notes-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.notes-block-hdr span{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.4px;}
.notes-block-hdr button{background:none;border:none;cursor:pointer;font-size:11px;color:var(--red);padding:2px 7px;border-radius:6px;border:1px solid transparent;}
.notes-block-hdr button:hover{background:#fdeaea;border-color:var(--red);}
.notes-block textarea,.notes-block input[type=text],.notes-block input[type=url]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);resize:vertical;}
.notes-block textarea:focus,.notes-block input:focus{outline:2px solid var(--teal);border-color:transparent;}
.nb-url-label{font-size:11px;color:var(--muted);margin:6px 0 3px;}
.notes-add-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.notes-add-bar .btn{font-size:12px;padding:5px 12px;}

/* ── Carousel (notas) ───────────────────────────────────────────── */
.carousel-wrap{position:relative;margin-bottom:10px;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.carousel-img{width:100%;max-height:280px;object-fit:contain;display:block;cursor:zoom-in;}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.82);border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.25);color:var(--text);}
.carousel-nav.prev{left:8px;}.carousel-nav.next{right:8px;}
.carousel-dots{display:flex;justify-content:center;gap:7px;margin-top:8px;margin-bottom:4px;}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:var(--border);border:none;cursor:pointer;padding:0;}
.carousel-dot.active{background:var(--accent);}

/* Notes blocks in detail view */
.notes-text-block{white-space:pre-wrap;line-height:1.65;font-size:14px;margin-bottom:10px;}
.notes-url-block{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--teal);text-decoration:none;margin-bottom:8px;background:#e8f2f7;max-width:100%;word-break:break-all;}
.notes-url-block:hover{opacity:.8;}

/* ── Refeições ──────────────────────────────────────────────────── */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.slot-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.slot-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.slot-header .slot-icon{font-size:22px;}
.slot-header h3{font-size:15px;font-weight:700;flex:1;color:var(--teal);}
.slot-header .slot-count{font-size:12px;color:var(--muted);}
.slot-entries{padding:10px 12px;}
.refeicao-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border);}
.ri-name{font-size:14px;font-weight:600;flex:1;}
.ri-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ri-actions{display:flex;gap:4px;flex-shrink:0;}
.ri-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:6px;color:var(--muted);}
.ri-btn:hover{background:var(--border);color:var(--text);}
.ri-btn.del:hover{background:#fdeaea;color:var(--red);}
.slot-add-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--muted);margin-top:4px;}
.slot-add-btn:hover{border-color:var(--teal);color:var(--teal);background:#e8f2f7;}
.sc-peq{border-top:3px solid #f59e0b;}.sc-lm{border-top:3px solid var(--green);}
.sc-alm{border-top:3px solid var(--teal);}.sc-lt{border-top:3px solid var(--amber);}
.sc-jan{border-top:3px solid #9b7fd4;}.sc-sei{border-top:3px solid #e07a8a;}

/* ── Modal ──────────────────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(42,60,42,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:24px;border:1px solid var(--border);}
.modal h2{font-size:17px;margin-bottom:18px;color:var(--teal);font-family:Georgia,serif;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--teal);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);font-family:inherit;resize:vertical;color:var(--text);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--teal);border-color:transparent;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.radio-group label{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);font-weight:normal;text-transform:none;letter-spacing:0;color:var(--text);}
.radio-group label:has(input:checked){border-color:var(--teal);background:#e8f2f7;color:var(--teal);}
.settings-row{display:flex;gap:8px;align-items:center;}.settings-row input{flex:1;}
.test-result{font-size:12px;margin-top:6px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .big{font-size:40px;margin-bottom:10px;}
.cat-input-wrap{display:flex;gap:6px;}.cat-input-wrap input{flex:1;}

/* ── Lightbox ───────────────────────────────────────────────────── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;object-fit:contain;}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <!-- garland strip -->
  <div class="header-garland" id="headerGarland"></div>
  <!-- main row -->
  <div class="header-body">
    <div class="header-botanical" id="headerBotLeft"></div>
    <div class="header-titles">
      <div class="header-title">As Minhas Receitas</div>
      <div class="header-sub">de Susana</div>
    </div>
    <div class="header-actions">
      <span id="statusDot" class="status-dot red"></span>
      <button class="btn-icon" onclick="openSettings()" title="Configurações">⚙️</button>
    </div>
  </div>
</header>

<!-- botanical strip -->
<div class="bstrip" id="bstrip"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('receitas')">📖 Receitas</div>
  <div class="tab" onclick="showTab('refeicoes')">🥗 Refeições</div>
</div>

<!-- ═══ RECEITAS ═══ -->
<div id="page-receitas" class="page active">
  <div id="view-list">
    <div class="toolbar">
      <input id="searchInput" class="search-box" placeholder="🔍 Pesquisar receitas..." oninput="renderRecipes()"/>
      <select id="filterCat" class="filter" onchange="renderRecipes()">
        <option value="">Todas as categorias</option>
      </select>
      <button class="btn btn-ghost" onclick="exportAllPDF(this)" title="Exportar todas as receitas para PDF">📄 Exportar</button>
      <button class="btn btn-primary" onclick="openRecipeModal()">+ Nova Receita</button>
    </div>
    <div id="recipesContainer"></div>
  </div>

  <div id="view-detail" class="recipe-detail">
    <div class="toolbar">
      <button class="btn btn-ghost" onclick="showList()">← Voltar</button>
      <button class="btn btn-ghost" onclick="exportRecipePDF(currentRecipe,this)">📄 PDF</button>
      <div style="flex:1"></div>
      <button class="btn btn-teal" onclick="editCurrent()">✏️ Editar</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑 Apagar</button>
    </div>
    <img id="detailPhoto" class="detail-photo" style="display:none" src="" alt="foto" onclick="openLightbox(this.src)"/>
    <div class="detail-header">
      <div id="detailEmoji" class="detail-emoji">🍽️</div>
      <div><h2 id="detailName" style="font-family:Georgia,serif;color:var(--teal)"></h2><div class="detail-meta" id="detailMeta"></div></div>
    </div>
    <div class="detail-section"><h4>🧂 Ingredientes</h4><p id="detailIngredients"></p></div>
    <div class="detail-section"><h4>👨‍🍳 Preparação</h4><p id="detailPreparation"></p></div>
    <div id="detailNotesSection" class="detail-section" style="display:none">
      <h4>📝 Notas</h4>
      <div id="detailNotes"></div>
    </div>
  </div>
</div>

<!-- ═══ REFEIÇÕES ═══ -->
<div id="page-refeicoes" class="page">
  <div class="toolbar">
    <span style="font-size:13px;color:var(--muted)">Organiza as tuas refeições diárias por tipo</span>
  </div>
  <div id="slotGrid" class="slot-grid"></div>
</div>

<!-- ═══ MODAL: RECEITA ═══ -->
<div id="recipeOverlay" class="overlay" onclick="closeIfBackdrop(event,'recipeOverlay')">
  <div class="modal">
    <h2 id="modalTitle">Nova Receita</h2>
    <input type="hidden" id="editId"/>

    <div class="form-row">
      <div class="form-group">
        <label>Emoji</label>
        <input id="fEmoji" value="🍽️" maxlength="4"/>
      </div>
      <div class="form-group">
        <label>Nome *</label>
        <input id="fName" placeholder="ex: Arroz de Pato"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <div class="cat-input-wrap">
          <input id="fCat" list="catDatalist" placeholder="Escolhe ou escreve nova..."/>
          <datalist id="catDatalist"></datalist>
        </div>
      </div>
      <div class="form-group">
        <label>Dificuldade</label>
        <select id="fDiff"><option>fácil</option><option selected>médio</option><option>difícil</option></select>
      </div>
    </div>

    <div class="form-row-3">
      <div class="form-group"><label>Tempo</label><input id="fTime" placeholder="30 min"/></div>
      <div class="form-group"><label>Porções</label><input id="fServings" type="number" value="4" min="1"/></div>
      <div class="form-group"><label>🔥 kcal / porção</label><input id="fCalories" type="number" min="0" placeholder="ex: 450"/></div>
    </div>

    <div class="form-group">
      <label>📷 Foto Principal</label>
      <label class="photo-upload-area" for="fPhotoInput">
        <span id="photoUploadLabel">Clica ou arrasta uma foto aqui</span>
        <img id="photoPreview" class="photo-preview" src="" alt="preview"/>
        <div id="photoRemove" class="photo-remove" onclick="removePhoto(event)">✕ Remover foto</div>
      </label>
      <input type="file" id="fPhotoInput" accept="image/*" style="display:none" onchange="onPhotoSelected(event)"/>
      <input type="hidden" id="fPhoto"/>
    </div>

    <div class="form-group"><label>Ingredientes</label><textarea id="fIngredients" rows="4" placeholder="500g frango&#10;2 dentes alho&#10;..."></textarea></div>
    <div class="form-group"><label>Preparação</label><textarea id="fPrep" rows="5" placeholder="1. Temperar...&#10;2. ..."></textarea></div>

    <div class="form-group">
      <label>Notas</label>
      <div id="notesBlockList"></div>
      <div class="notes-add-bar">
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('text')">+ Texto</button>
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('image')">+ Foto</button>
        <button type="button" class="btn btn-ghost" onclick="addNotesBlock('url')">+ URL</button>
      </div>
      <input type="file" id="notesPhotoInput" accept="image/*" style="display:none" onchange="onNotesPhotoSelected(event)"/>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('recipeOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: REFEIÇÃO ═══ -->
<div id="refeicaoOverlay" class="overlay" onclick="closeIfBackdrop(event,'refeicaoOverlay')">
  <div class="modal">
    <h2 id="refeicaoModalTitle">Adicionar refeição</h2>
    <input type="hidden" id="rfSlot"/>
    <input type="hidden" id="rfId"/>

    <div class="form-group">
      <label>Nome da refeição *</label>
      <input id="rfName" placeholder="ex: Iogurte com granola, Sopa de legumes..."/>
    </div>

    <div class="form-group">
      <label>Receita associada (opcional)</label>
      <select id="rfRecipeSel" onchange="onRecipeSelected()">
        <option value="">— Nenhuma —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Ingredientes / notas (opcional)</label>
      <textarea id="rfIngr" rows="3" placeholder="1 iogurte natural&#10;2 colheres granola..."></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('refeicaoOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRefeicao()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: SETTINGS ═══ -->
<div id="settingsOverlay" class="overlay" onclick="closeIfBackdrop(event,'settingsOverlay')">
  <div class="modal" style="max-width:420px">
    <h2>⚙️ Configuração API</h2>
    <div class="form-group">
      <label>URL do Backend</label>
      <div class="settings-row">
        <input id="sUrl" placeholder="https://receitas-api-xxx.run.app"/>
        <button class="btn btn-ghost" onclick="testConnection()">Testar</button>
      </div>
      <div id="testResult" class="test-result"></div>
    </div>
    <div class="form-group"><label>API Key</label><input id="sKey" type="password"/></div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px">Sem URL, a app funciona offline com dados locais.</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('settingsOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSettings()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ LIGHTBOX ═══ -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
// ─── Botanical SVG helpers ────────────────────────────────────────────────────
function svgOrange(w=36,h=42){return`<svg width="${w}" height="${h}" viewBox="0 0 36 42" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M18 8 L18 2" stroke="#6B3A1F" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M18 6 Q26 0 31 6 Q26 12 18 6Z" fill="#4A7840"/>
  <path d="M19 6 Q25 3 28 7" stroke="#386030" stroke-width=".7" fill="none"/>
  <circle cx="18" cy="26" r="16" fill="#E87828"/>

// ─── Config ───────────────────────────────────────────────────────────────────
const getApiUrl=()=>localStorage.getItem('api_url')||'';
const getApiKey=()=>localStorage.getItem('api_key')||'';
const hdrs=(x={})=>{const h={'Content-Type':'application/json',...x};if(getApiKey())h['X-API-Key']=getApiKey();return h;};
function setStatus(s){const d=document.getElementById('statusDot');d.className='status-dot'+(s!=='green'?' '+s:'');}

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiFetch(path,opts={},timeoutMs=30000){
  const base=getApiUrl();if(!base)throw new Error('Sem URL');
  setStatus('orange');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const res=await fetch(base.replace(/\/$/,'')+path,{...opts,headers:hdrs(opts.headers||{}),signal:ctrl.signal});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    setStatus('green');
    return res.status===204?null:res.json();
  }finally{clearTimeout(tid);}
}

// ─── Load ─────────────────────────────────────────────────────────────────────
async function loadAll(){
  if(!getApiUrl()){loadLocal();setStatus('red');render();return;}
  try{
    [recipes,refeicoes,categories]=await Promise.all([
      apiFetch('/recipes'),apiFetch('/refeicoes'),apiFetch('/categories')
    ]);
    saveLocal();setStatus('green');
  }catch{loadLocal();setStatus('red');}
  render();
}
function loadLocal(){
  try{recipes=JSON.parse(localStorage.getItem('recipes')||'[]');}catch{recipes=[];}
  try{refeicoes=JSON.parse(localStorage.getItem('refeicoes')||'{}');}catch{refeicoes={};}
  try{categories=JSON.parse(localStorage.getItem('categories')||'null')||[...DEFAULT_CATS];}catch{categories=[...DEFAULT_CATS];}
}
function saveLocal(){
  localStorage.setItem('recipes',JSON.stringify(recipes));
  localStorage.setItem('refeicoes',JSON.stringify(refeicoes));
  localStorage.setItem('categories',JSON.stringify(categories));
}
function render(){renderRecipes();renderSlots();populateCatFilter();populateCatDatalist();}

function renderRecipes(){
  const q=document.getElementById('searchInput').value.toLowerCase();

  let list=recipes.filter(r=>
    (!q||r.name.toLowerCase().includes(q)||(r.ingredients||'').toLowerCase().includes(q))&&

  const container=document.getElementById('recipesContainer');
  if(!list.length){container.innerHTML='<div class="empty"><div class="big">🍊</div><p>Sem receitas. Adiciona a primeira!</p></div>';return;}

  list.forEach(r=>{const c=r.category||'Outro';if(!grouped[c])grouped[c]=[];grouped[c].push(r);});

// Constrói o HTML das notas respeitando a ordem dos blocos.
// Imagens são agrupadas num carrossel injectado onde está o PRIMEIRO bloco de imagem.
function buildNotesHtml(notes){
  if(!notes)return'';
  let blocks;
  if(Array.isArray(notes))blocks=notes;
  else if(typeof notes==='string'&&notes.trim())blocks=[{type:'text',content:notes}];
  else return'';
  carouselImages=blocks.filter(b=>b.type==='image'&&b.data).map(b=>b.data);
  carouselIdx=0;
  let carouselDone=false;
  return blocks.map(b=>{
    if(b.type==='text')return`<p class="notes-text-block">${escRaw(b.content||'')}</p>`;
    if(b.type==='image'&&b.data){
      if(!carouselDone){
        carouselDone=true;
        // injector do carrossel na posição correta
        return`<div class="carousel-wrap" id="notesCarouselWrap">
          <img id="carouselImg" class="carousel-img" src="${carouselImages[0]}" alt="" onclick="openLightbox(this.src)"/>
          <button class="carousel-nav prev" id="carouselPrev" onclick="stepCarousel(-1)" style="${carouselImages.length<2?'display:none':''}">‹</button>
          <button class="carousel-nav next" id="carouselNext" onclick="stepCarousel(1)" style="${carouselImages.length<2?'display:none':''}">›</button>
        </div>
        <div class="carousel-dots" id="carouselDots">${carouselImages.map((_,i)=>`<button class="carousel-dot${i===0?' active':''}" onclick="goCarousel(${i})"></button>`).join('')}</div>`;
      }
      return'';// bloco de imagem seguinte está no carrossel, não repetir
    }
    if(b.type==='url'&&b.url)return`<a href="${esc(b.url)}" target="_blank" rel="noopener" class="notes-url-block">🔗 ${esc(b.label||b.url)}</a><br/>`;
    return'';
  }).join('');
}

// ─── Carousel ─────────────────────────────────────────────────────────────────
function refreshCarousel(){
  const img=document.getElementById('carouselImg');if(!img)return;
  img.src=carouselImages[carouselIdx];
  const prev=document.getElementById('carouselPrev');
  const next=document.getElementById('carouselNext');
  if(prev)prev.style.display=carouselImages.length>1?'flex':'none';
  if(next)next.style.display=carouselImages.length>1?'flex':'none';
  const dots=document.getElementById('carouselDots');
  if(dots)dots.innerHTML=carouselImages.map((_,i)=>
    `<button class="carousel-dot${i===carouselIdx?' active':''}" onclick="goCarousel(${i})"></button>`).join('');
}
function stepCarousel(d){carouselIdx=(carouselIdx+d+carouselImages.length)%carouselImages.length;refreshCarousel();}
function goCarousel(i){carouselIdx=i;refreshCarousel();}

function showList(){document.getElementById('view-list').style.display='';document.getElementById('view-detail').classList.remove('active');currentRecipe=null;}

// ─── Photo upload (foto principal) ────────────────────────────────────────────
function onPhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',.75);
      document.getElementById('fPhoto').value=compressed;
      document.getElementById('photoPreview').src=compressed;
      document.getElementById('photoPreview').style.display='block';
      document.getElementById('photoRemove').style.display='block';
      document.getElementById('photoUploadLabel').textContent='Foto seleccionada ✓';
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}
function removePhoto(e){
  e.preventDefault();e.stopPropagation();
  document.getElementById('fPhoto').value='';document.getElementById('fPhotoInput').value='';
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoRemove').style.display='none';
  document.getElementById('photoUploadLabel').textContent='Clica ou arrasta uma foto aqui';
}

// ─── Notes block editor ───────────────────────────────────────────────────────
function renderNotesEditor(){
  document.getElementById('notesBlockList').innerHTML=notesBlocks.map((b,i)=>{
    if(b.type==='text')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📝 Texto</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        <textarea rows="3" oninput="notesBlocks[${i}].content=this.value">${escRaw(b.content||'')}</textarea>
      </div>`;
    if(b.type==='image')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>📷 Foto</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        ${b.data
          ?`<img src="${b.data}" style="max-width:100%;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="pickNotesPhoto(${i})" title="Clica para trocar"/>
            <div style="font-size:11px;color:var(--muted)">Clica na foto para trocar</div>`
          :`<div class="photo-upload-area" onclick="pickNotesPhoto(${i})">Clica para adicionar foto</div>`}
      </div>`;
    if(b.type==='url')return`
      <div class="notes-block">
        <div class="notes-block-hdr"><span>🔗 URL</span><button type="button" onclick="removeNotesBlock(${i})">✕ Remover</button></div>
        <input type="url" placeholder="https://..." value="${esc(b.url||'')}" oninput="notesBlocks[${i}].url=this.value" style="margin-bottom:6px"/>
        <div class="nb-url-label">Texto do link (opcional)</div>
        <input type="text" placeholder="ex: Receita original" value="${esc(b.label||'')}" oninput="notesBlocks[${i}].label=this.value"/>
      </div>`;
    return'';
  }).join('');
}
function addNotesBlock(type){
  if(type==='text')notesBlocks.push({type:'text',content:''});
  else if(type==='image')notesBlocks.push({type:'image',data:null});
  else if(type==='url')notesBlocks.push({type:'url',url:'',label:''});
  renderNotesEditor();
}
function removeNotesBlock(i){notesBlocks.splice(i,1);renderNotesEditor();}
function pickNotesPhoto(i){
  notesPhotoTargetIdx=i;
  document.getElementById('notesPhotoInput').value='';
  document.getElementById('notesPhotoInput').click();
}
function onNotesPhotoSelected(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      notesBlocks[notesPhotoTargetIdx].data=canvas.toDataURL('image/jpeg',.75);
      renderNotesEditor();
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}
function loadNotesIntoEditor(notes){
  if(!notes)notesBlocks=[];
  else if(Array.isArray(notes))notesBlocks=JSON.parse(JSON.stringify(notes));
  else if(typeof notes==='string'&&notes.trim())notesBlocks=[{type:'text',content:notes}];
  else notesBlocks=[];
  renderNotesEditor();
}

function openRecipeModal(r=null){

  document.getElementById('editId').value=r?r.id:'';
  document.getElementById('fEmoji').value=r?r.emoji:'🍽️';

  document.getElementById('fTime').value=r?(r.time||''):'';
  document.getElementById('fServings').value=r?(r.servings||4):4;
  document.getElementById('fCalories').value=r?(r.calories||''):'';
  document.getElementById('fIngredients').value=r?(r.ingredients||''):'';
  document.getElementById('fPrep').value=r?(r.preparation||''):'';
  document.getElementById('fPhoto').value=r?(r.photo||''):'';
  document.getElementById('fPhotoInput').value='';

    document.getElementById('photoPreview').src=r.photo;
    document.getElementById('photoPreview').style.display='block';

  }
  loadNotesIntoEditor(r?r.notes:null);
  populateCatDatalist();
  openModal('recipeOverlay');
}

async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('O nome é obrigatório.');return;}
  const cat=document.getElementById('fCat').value.trim()||'Outro';
  const photo=document.getElementById('fPhoto').value||null;
  const calVal=document.getElementById('fCalories').value;
  const calories=calVal?parseInt(calVal):null;
  // sincroniza textareas antes de guardar
  document.querySelectorAll('#notesBlockList .notes-block').forEach((el,i)=>{
    const ta=el.querySelector('textarea');if(ta&&notesBlocks[i])notesBlocks[i].content=ta.value;
  });
  const notes=notesBlocks.length>0?notesBlocks:null;
  const body={name,emoji:document.getElementById('fEmoji').value.trim()||'🍽️',
    category:cat,difficulty:document.getElementById('fDiff').value,
    time:document.getElementById('fTime').value.trim(),
    servings:parseInt(document.getElementById('fServings').value)||4,
    calories,ingredients:document.getElementById('fIngredients').value.trim(),
    preparation:document.getElementById('fPrep').value.trim(),notes,photo};
  const id=document.getElementById('editId').value;
  if(cat&&!categories.includes(cat))categories.push(cat);
  try{
    if(id){const u=await apiFetch(`/recipes/${id}`,{method:'PUT',body:JSON.stringify(body)});const i=recipes.findIndex(r=>r.id===id);if(i>=0)recipes[i]=u;currentRecipe=u;}
    else{const c=await apiFetch('/recipes',{method:'POST',body:JSON.stringify(body)});recipes.push(c);}
    try{categories=await apiFetch('/categories');}catch{}
  }catch{
    if(id){const i=recipes.findIndex(r=>r.id===id);if(i>=0){recipes[i]={...recipes[i],...body};currentRecipe=recipes[i];}}
    else{const r={...body,id:crypto.randomUUID(),created_at:new Date().toISOString()};recipes.push(r);}
  }
  saveLocal();closeModal('recipeOverlay');
  if(id)showDetail(id);else showList();
  render();
}

async function deleteCurrent(){
  if(!currentRecipe)return;
  if(!confirm(`Tens a certeza que queres apagar "${currentRecipe.name}"?\nEsta ação não pode ser desfeita.`))return;
  try{await apiFetch(`/recipes/${currentRecipe.id}`,{method:'DELETE'});}catch{}
  recipes=recipes.filter(r=>r.id!==currentRecipe.id);
  saveLocal();showList();render();
}

            </div>
            <div class="ri-actions">
              <button class="ri-btn" onclick="openEditRefeicao('${s.key}','${e.id}')">✏️</button>
              <button class="ri-btn del" onclick="deleteRefeicao('${s.key}','${e.id}')">✕</button>
            </div>
          </div>`).join('')}
        <button class="slot-add-btn" onclick="openAddRefeicao('${s.key}')">+ Adicionar</button>
      </div>
    </div>`;
  }).join('');
}

function openAddRefeicao(slot){
  const s=SLOTS.find(x=>x.key===slot);
  document.getElementById('refeicaoModalTitle').textContent=`${s.icon} ${s.label}`;
  document.getElementById('rfSlot').value=slot;
  document.getElementById('rfId').value='';
  document.getElementById('rfName').value='';
  document.getElementById('rfIngr').value='';
  const sel=document.getElementById('rfRecipeSel');
  sel.innerHTML='<option value="">— Nenhuma —</option>'+
    recipes.map(r=>`<option value="${r.id}">${r.emoji||'🍽️'} ${esc(r.name)}</option>`).join('');
  sel.value='';
  openModal('refeicaoOverlay');
  setTimeout(()=>document.getElementById('rfName').focus(),120);
}

function openEditRefeicao(slot,id){
  const entry=(refeicoes[slot]||[]).find(e=>e.id===id);if(!entry)return;
  const s=SLOTS.find(x=>x.key===slot);
  document.getElementById('refeicaoModalTitle').textContent=`${s.icon} ${s.label} — Editar`;
  document.getElementById('rfSlot').value=slot;
  document.getElementById('rfId').value=id;
  document.getElementById('rfName').value=entry.name;
  document.getElementById('rfIngr').value=entry.ingredients||'';
  const sel=document.getElementById('rfRecipeSel');
  sel.innerHTML='<option value="">— Nenhuma —</option>'+
    recipes.map(r=>`<option value="${r.id}">${r.emoji||'🍽️'} ${esc(r.name)}</option>`).join('');
  sel.value=entry.recipe_id||'';
  openModal('refeicaoOverlay');
}

function onRecipeSelected(){
  const id=document.getElementById('rfRecipeSel').value;
  if(!id)return;
  const r=recipes.find(x=>x.id===id);
  if(r&&!document.getElementById('rfName').value.trim())
    document.getElementById('rfName').value=r.name;
}

async function saveRefeicao(){
  const slot=document.getElementById('rfSlot').value;
  const editId=document.getElementById('rfId').value;
  const name=document.getElementById('rfName').value.trim();
  if(!name){alert('O nome é obrigatório.');document.getElementById('rfName').focus();return;}
  const recipe_id=document.getElementById('rfRecipeSel').value||null;
  const ingredients=document.getElementById('rfIngr').value.trim()||null;
  const body={name,recipe_id,ingredients};
  try{
    if(editId){
      const u=await apiFetch(`/refeicoes/${encodeURIComponent(slot)}/${editId}`,{method:'PUT',body:JSON.stringify(body)});
      const i=(refeicoes[slot]||[]).findIndex(e=>e.id===editId);
      if(i>=0)refeicoes[slot][i]=u;
    }else{
      const c=await apiFetch(`/refeicoes/${encodeURIComponent(slot)}`,{method:'POST',body:JSON.stringify(body)});
      if(!refeicoes[slot])refeicoes[slot]=[];
      refeicoes[slot].push(c);
    }
  }catch{
    if(!refeicoes[slot])refeicoes[slot]=[];
    if(editId){const i=refeicoes[slot].findIndex(e=>e.id===editId);if(i>=0)refeicoes[slot][i]={...refeicoes[slot][i],...body};}
    else refeicoes[slot].push({id:crypto.randomUUID(),...body});
  }
  saveLocal();closeModal('refeicaoOverlay');renderSlots();
}

async function deleteRefeicao(slot,id){
  if(!confirm('Remover esta refeição?'))return;
  try{await apiFetch(`/refeicoes/${encodeURIComponent(slot)}/${id}`,{method:'DELETE'});}catch{}
  if(refeicoes[slot])refeicoes[slot]=refeicoes[slot].filter(e=>e.id!==id);
  saveLocal();renderSlots();
}

async function testConnection(){

    const h={'Content-Type':'application/json'};if(key)h['X-API-Key']=key;
    const res=await fetch(url.replace(/\/$/,'')+'/health',{headers:h});
    if(res.ok){const d=await res.json();el.textContent=`✅ Ligado! Storage: ${d.storage}`;el.style.color='var(--green)';}
    else{el.textContent=`❌ Erro HTTP ${res.status}`;el.style.color='var(--red)';}

// ─── PDF Export ───────────────────────────────────────────────────────────────
const PC={
  cream:[245,239,216], card:[254,252,240], teal:[42,88,104],
  accent:[192,88,24], green:[74,120,64], red:[176,24,32],
  border:[223,212,184], muted:[122,136,112], amber:[232,138,24],
  white:[255,255,255], dark:[55,55,55]
};

async function loadJsPDF(){
  if(window.jspdf)return;
  await new Promise((ok,fail)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=ok;s.onerror=()=>fail(new Error('Falha ao carregar jsPDF'));
    document.head.appendChild(s);
  });
}

/* ── botanical drawing primitives ── */
function pdOrange(doc,cx,cy,r=5){
  doc.setFillColor(...PC.green);
  doc.ellipse(cx+r*.42,cy-r-1.2,r*.55,r*.28,'F');
  doc.setFillColor(232,120,40);doc.circle(cx,cy,r,'F');
  doc.setFillColor(244,160,80);doc.circle(cx-r*.3,cy-r*.3,r*.28,'F');
}
function pdFlower(doc,cx,cy,r=4){
  doc.setFillColor(...PC.red);
  for(let i=0;i<5;i++){
    const a=(i*72-90)*Math.PI/180;
    doc.circle(cx+Math.cos(a)*r*.62,cy+Math.sin(a)*r*.62,r*.42,'F');
  }
  doc.setFillColor(240,200,60);doc.circle(cx,cy,r*.38,'F');
}
function pdLeaf(doc,cx,cy,r=4){
  doc.setFillColor(...PC.green);doc.ellipse(cx,cy,r*.32,r,'F');
}
function pdBorderStrip(doc,y,pw){
  doc.setDrawColor(...PC.teal);doc.setLineWidth(.5);
  doc.line(15,y,pw-15,y);
  for(let x=22,i=0;x<pw-15;x+=20,i++){
    if(i%3===0)pdOrange(doc,x,y-4,3);
    else if(i%3===1)pdFlower(doc,x,y-4,2.8);
    else pdLeaf(doc,x,y-4.5,3.2);
  }
}

/* ── layout helpers ── */
function pdHeading(doc,label,y,m){
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);
  doc.setFillColor(...PC.teal);
  const tw=doc.getTextWidth(label)+5;
  doc.roundedRect(m,y-4,tw,6.5,1,1,'F');
  doc.setTextColor(...PC.white);doc.text(label,m+2.5,y+.5);
  return y+9;
}
function pdBody(doc,text,y,pw,m){
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.setTextColor(...PC.dark);
  const lines=doc.splitTextToSize(text||'—',pw-m*2);
  doc.text(lines,m,y);
  return y+lines.length*5.2+2;
}
function pdContinuationPage(doc,name){
  doc.addPage();
  doc.setFillColor(...PC.cream);doc.rect(0,0,210,297,'F');
  doc.setFont('helvetica','italic');doc.setFontSize(8);
  doc.setTextColor(...PC.muted);doc.text(name,15,10);
  doc.setDrawColor(...PC.border);doc.setLineWidth(.3);doc.line(15,12,195,12);
  return 18;
}
function needY(doc,y,need,name){
  return(y+need>275)?pdContinuationPage(doc,name):y;
}

/* ── detect image format from data URL ── */
function imgFmt(dataUrl){
  if(!dataUrl)return'JPEG';
  if(dataUrl.startsWith('data:image/png'))return'PNG';
  if(dataUrl.startsWith('data:image/webp'))return'WEBP';
  return'JPEG';
}
/* ── strip emoji from string (PDF fonts don't support emoji) ── */
function stripEmoji(s){
  return(s||'').replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{FE00}-\u{FEFF}]/gu,'').trim();
}

/* ── single recipe layout (draws on current page) ── */
async function pdDrawRecipe(doc,recipe){
  const pw=210,ph=297,m=15;let y=m;
  doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
  // photo or botanical top
  if(recipe.photo){
    try{doc.addImage(recipe.photo,imgFmt(recipe.photo),m,y,pw-m*2,68,'','MEDIUM');y+=71;}
    catch(e){pdBorderStrip(doc,y+6,pw);y+=13;}
  }else{pdBorderStrip(doc,y+6,pw);y+=13;}
  // name (emoji stripped — PDF fonts don't support them)
  doc.setFont('helvetica','bold');doc.setFontSize(21);doc.setTextColor(...PC.teal);
  const nm=doc.splitTextToSize(stripEmoji(recipe.name),pw-m*2);
  doc.text(nm,m,y);y+=nm.length*9.5+3;
  // badges
  doc.setFontSize(8.5);let bx=m;
  const badges=[
    recipe.category&&{l:recipe.category,c:PC.accent},
    recipe.time&&{l:'Tempo: '+recipe.time,c:PC.teal},
    recipe.servings&&{l:recipe.servings+' porções',c:PC.green},
    recipe.calories&&{l:recipe.calories+' kcal/porção',c:[180,90,15]},
    recipe.difficulty&&{l:recipe.difficulty,c:{fácil:PC.green,médio:PC.amber,difícil:PC.red}[recipe.difficulty]||PC.muted},
  ].filter(Boolean);
  for(const b of badges){
    const tw=doc.getTextWidth(b.l)+5;
    if(bx+tw>pw-m){bx=m;y+=7;}
    doc.setFillColor(...b.c);
    doc.roundedRect(bx,y-3.5,tw,5.5,1,1,'F');
    doc.setTextColor(...PC.white);doc.text(b.l,bx+2.5,y+.5);
    bx+=tw+3;
  }
  y+=9;
  doc.setDrawColor(...PC.border);doc.setLineWidth(.3);doc.line(m,y,pw-m,y);y+=6;
  // sections
  if(recipe.ingredients){
    y=needY(doc,y,15,recipe.name);
    y=pdHeading(doc,'INGREDIENTES',y,m);
    y=pdBody(doc,recipe.ingredients,y,pw,m);y+=4;
  }
  if(recipe.preparation){
    y=needY(doc,y,15,recipe.name);
    y=pdHeading(doc,'PREPARAÇÃO',y,m);
    y=pdBody(doc,recipe.preparation,y,pw,m);y+=4;
  }
  // notes blocks
  const notes=recipe.notes;
  if(notes){
    const blocks=Array.isArray(notes)?notes:(typeof notes==='string'&&notes.trim()?[{type:'text',content:notes}]:[]);
    if(blocks.length){
      y=needY(doc,y,15,recipe.name);
      y=pdHeading(doc,'NOTAS',y,m);
      for(const b of blocks){
        if(b.type==='text'&&b.content){
          y=needY(doc,y,10,recipe.name);y=pdBody(doc,b.content,y,pw,m);
        }else if(b.type==='url'&&b.url){
          y=needY(doc,y,8,recipe.name);
          doc.setFontSize(9);doc.setTextColor(...PC.teal);doc.setFont('helvetica','normal');
          const ul='Link: '+(b.label||b.url);
          doc.text(ul,m,y);doc.link(m,y-4,doc.getTextWidth(ul),5,{url:b.url});y+=7;
        }else if(b.type==='image'&&b.data){
          y=needY(doc,y,58,recipe.name);
          try{doc.addImage(b.data,imgFmt(b.data),m,y,pw-m*2,56,'','MEDIUM');y+=59;}
          catch(e){}
        }
      }
    }
  }
  // footer
  pdBorderStrip(doc,ph-10,pw);
  doc.setFontSize(7.5);doc.setTextColor(...PC.muted);doc.setFont('helvetica','italic');
  doc.text('As Minhas Receitas · de Susana',pw/2,ph-4,{align:'center'});
}

/* ── export single recipe ── */
async function exportRecipePDF(recipe,btn){
  if(!recipe)return;
  const orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    await pdDrawRecipe(doc,recipe);
    doc.save((recipe.name||'receita').replace(/[^\w\s-]/gi,'_').trim()+'.pdf');
  }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  finally{if(btn){btn.textContent=orig;btn.disabled=false;}}
}

/* ── export all recipes by category ── */
async function exportAllPDF(btn){
  if(!recipes.length){alert('Não há receitas para exportar.');return;}
  const orig=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ A gerar…';btn.disabled=true;}
  try{
    await loadJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,m=15;

    /* ── capa ── */
    doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
    doc.setFillColor(...PC.teal);
    doc.rect(0,0,pw,5,'F');doc.rect(0,ph-5,pw,5,'F');
    // motivos botânicos capa
    pdOrange(doc,75,122,11);pdOrange(doc,140,115,12);
    pdFlower(doc,109,106,8);pdFlower(doc,66,132,6);
    pdLeaf(doc,57,116,9);pdLeaf(doc,154,118,8);pdLeaf(doc,148,104,6);
    // linhas decorativas
    doc.setDrawColor(...PC.teal);doc.setLineWidth(.8);
    doc.line(45,142,165,142);doc.line(45,164,165,164);
    // título
    doc.setFont('helvetica','bold');doc.setFontSize(28);doc.setTextColor(...PC.teal);
    doc.text('As Minhas Receitas',pw/2,154,{align:'center'});
    doc.setFont('helvetica','italic');doc.setFontSize(13);doc.setTextColor(...PC.muted);
    doc.text('de Susana',pw/2,172,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    doc.text(recipes.length+' receitas',pw/2,184,{align:'center'});
    doc.setFontSize(9);
    doc.text(new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'}),pw/2,194,{align:'center'});

    /* ── categorias ── */
    const grouped={};
    recipes.forEach(r=>{const c=r.category||'Outro';if(!grouped[c])grouped[c]=[];grouped[c].push(r);});
    for(const cat of Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'pt'))){
      /* página separadora de categoria */
      doc.addPage();
      doc.setFillColor(...PC.cream);doc.rect(0,0,pw,ph,'F');
      // barra lateral teal
      doc.setFillColor(...PC.teal);doc.rect(0,0,9,ph,'F');
      // motivos botânicos à direita
      pdOrange(doc,150,ph/2-20,12);pdFlower(doc,168,ph/2+6,9);
      pdLeaf(doc,136,ph/2-8,9);pdOrange(doc,161,ph/2+22,8);pdLeaf(doc,174,ph/2-2,7);
      // nome da categoria
      doc.setFont('helvetica','bold');doc.setFontSize(36);doc.setTextColor(...PC.teal);
      const cl=doc.splitTextToSize(cat,105);
      const catY=ph/2-((cl.length-1)*18)/2;
      cl.forEach((line,i)=>doc.text(line,20,catY+i*20));
      // contagem
      doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor(...PC.muted);
      const n=grouped[cat].length;
      doc.text(n+' receita'+(n!==1?'s':''),20,catY+cl.length*20+4);
      // barra de acento laranja
      doc.setFillColor(...PC.accent);
      doc.rect(13,catY-10,3.5,cl.length*20+18,'F');

      /* receitas da categoria */
      for(const recipe of grouped[cat]){
        doc.addPage();
        await pdDrawRecipe(doc,recipe);
      }
    }

    /* números de página (a partir da pág 2) */
    const total=doc.internal.getNumberOfPages();
    for(let i=2;i<=total;i++){
      doc.setPage(i);
      doc.setFontSize(8);doc.setTextColor(...PC.muted);
      doc.setFont('helvetica','normal');
      doc.text(String(i),pw-m,ph-4,{align:'right'});
    }
    doc.save('As_Minhas_Receitas.pdf');
  }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  finally{if(btn){btn.textContent=orig;btn.disabled=false;}}
}
